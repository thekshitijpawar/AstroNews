<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navars Edutech | Space Operations Live</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
    
    :root {
      --bg: #040507;
      --text: #ffffff;
      --text-muted: #8e9cae;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #3b82f6;
      --font-display: 'Outfit', sans-serif;
      --font-sans: 'Inter', sans-serif;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    
    /* Cosmic background JWST Cliffs */
    .bg-overlay {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(to bottom, rgba(4, 5, 7, 0.4), rgba(4, 5, 7, 0.2)),
        url('https://images-assets.nasa.gov/image/carina_nebula/carina_nebula~medium.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      opacity: 0.40;
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.15s ease;
    }

    /* Subtle Twinkling Starfield */
    .stars {
      position: absolute;
      inset: 0;
      background-image: 
        radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 15px);
      background-size: 380px 380px;
      opacity: 0.08;
      animation: space-twinkle 20s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes space-twinkle {
      0% { opacity: 0.05; }
      100% { opacity: 0.12; }
    }
    
    .container {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: grid;
      grid-template-rows: 64px 1fr 1px 180px 32px;
      padding: 0 40px;
    }
    
    /* Header Nav */
    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      height: 100%;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: white;
      padding: 2px;
      object-fit: contain;
    }
    .brand-name {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 1.05rem;
      letter-spacing: 0.5px;
    }
    .clocks {
      display: flex;
      gap: 20px;
    }
    .clock-pill {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }
    .btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-display);
      font-size: 0.72rem;
      font-weight: 500;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .btn:hover {
      background: white;
      color: black;
      border-color: white;
    }
    .btn.scroll-mode {
      background: rgba(59, 130, 246, 0.15);
      border-color: rgba(59, 130, 246, 0.3);
      color: #93c5fd;
    }
    .btn.scroll-mode:hover {
      background: rgba(59, 130, 246, 0.25);
    }
    
    /* Hero Section (Grid: Left text, Center image, Right list) */
    .hero-section {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr 1fr;
      gap: 40px;
      align-items: center;
      padding: 30px 0;
      min-height: 0;
      height: 100%;
    }
    
    /* Left Spotlight Text */
    .spotlight-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
      overflow: hidden;
    }
    .spotlight-category {
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .spotlight-title {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 500;
      line-height: 1.25;
      color: var(--text);
      margin-bottom: 16px;
      letter-spacing: -0.5px;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .spotlight-summary {
      font-size: 0.88rem;
      line-height: 1.6;
      color: var(--text-muted);
      margin-bottom: 24px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .spotlight-meta {
      font-size: 0.72rem;
      color: var(--text-muted);
    }
    .spotlight-meta a {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      margin-left: 8px;
    }
    .spotlight-meta a:hover {
      text-decoration: underline;
    }
    
    /* Center Spotlight Image */
    .spotlight-image-container {
      height: 100%;
      width: 100%;
      border-radius: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .spotlight-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 4px;
      transition: transform 12s ease;
    }
    .spotlight-image-container:hover .spotlight-image {
      transform: scale(1.06);
    }
    
    /* Right Stories List */
    .stories-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      height: 100%;
      justify-content: center;
      overflow-y: auto;
    }
    .story-card {
      display: flex;
      gap: 16px;
      align-items: center;
      cursor: pointer;
      transition: opacity 0.2s ease;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.02);
    }
    .story-card:hover {
      opacity: 0.8;
    }
    .story-thumb {
      width: 76px;
      height: 76px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
      background: #111;
    }
    .story-details {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .story-meta {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .story-title {
      font-family: var(--font-display);
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.3;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    /* Scroll Layout */
    .scroll-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      height: 100%;
      overflow-y: auto;
      padding: 30px 0;
    }
    .scroll-card {
      display: flex;
      gap: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }
    .scroll-thumb {
      width: 90px;
      height: 90px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
      background: #111;
    }
    .scroll-details {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .scroll-meta {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .scroll-title a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      font-family: var(--font-display);
      font-size: 0.95rem;
      line-height: 1.3;
    }
    .scroll-title a:hover {
      text-decoration: underline;
    }
    .scroll-desc {
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Divider */
    .divider {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 0;
    }
    
    /* Bottom 4 Columns Row */
    .bottom-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 30px;
      padding: 24px 0;
      min-height: 0;
    }
    .bottom-col {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }
    .col-header {
      font-size: 0.68rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .col-title {
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 500;
      line-height: 1.35;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .col-desc {
      font-size: 0.78rem;
      line-height: 1.45;
      color: var(--text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    /* Footer */
    .footer-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.68rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      height: 100%;
    }

    /* Scrollbars styling */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 99px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Brightness Slider Styling */
    .brightness-control {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .brightness-control input[type="range"] {
      -webkit-appearance: none;
      width: 70px;
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 99px;
      outline: none;
      cursor: pointer;
    }
    .brightness-control input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: white;
      transition: background 0.15s ease;
    }
    .brightness-control input[type="range"]::-webkit-slider-thumb:hover {
      background: #60a5fa;
    }

    /* Nav links styles */
    .nav-links {
      display: flex;
      gap: 8px;
    }
    .nav-link-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-display);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 6px;
      transition: all 0.2s ease;
      outline: none;
    }
    .nav-link-btn:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
    }

    /* Modal Overlay Styles */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(15px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    .modal-window {
      background: rgba(10, 15, 26, 0.95);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 95vw;
      max-width: 1420px;
      height: 90vh;
      max-height: 90vh;
      display: grid;
      grid-template-rows: 64px 1fr;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
      animation: modal-zoom 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes modal-zoom {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 30px;
      border-bottom: 1px solid var(--border);
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .modal-close-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 6px;
      transition: color 0.15s ease;
    }
    .modal-close-btn:hover {
      color: white;
    }
    .modal-body {
      padding: 30px;
      overflow-y: auto;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Lightbox Modal */
    .lightbox-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .lightbox-img {
      max-width: 95vw;
      max-height: 95vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
      animation: modal-zoom 0.25s ease-out;
    }

    /* Form Styles */
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .form-control {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: white;
      padding: 12px 16px;
      font-family: var(--font-sans);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s ease;
    }
    .form-control:focus {
      border-color: #3b82f6;
    }
    
    /* Tabs for Student's Corner */
    .corner-tabs {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
      padding-bottom: 12px;
    }
    .tab-btn-group {
      display: flex;
      gap: 16px;
    }
    .tab-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-display);
      font-size: 0.9rem;
      cursor: pointer;
      padding-bottom: 12px;
      position: relative;
    }
    .tab-btn.active {
      color: white;
      font-weight: 600;
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -13px;
      left: 0;
      right: 0;
      height: 2px;
      background: #3b82f6;
    }

    .badge.archived {
      color: #94a3b8;
      background: rgba(148, 163, 184, 0.1);
      border: 1px solid rgba(148, 163, 184, 0.2);
    }

    /* Sidebar Enlarged Showcase Card for Drawings & PDFs */
    .sidebar-enlarged-card {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #090c15;
      transition: border-color 0.2s ease;
      cursor: pointer;
    }
    .sidebar-enlarged-card:hover {
      border-color: rgba(255, 255, 255, 0.2);
    }
    .sidebar-enlarged-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .sidebar-enlarged-overlay {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.9) 60%);
      padding: 16px;
      display: flex;
      flex-direction: column;
    }

    /* Submissions Grid */
    .submission-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 24px;
    }
    .submission-card {
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .submission-card:hover {
      background: rgba(255, 255, 255, 0.02);
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.15);
    }
    .submission-thumb-wrap {
      width: 100%;
      height: 180px;
      overflow: hidden;
      background: #090c15;
    }
    .submission-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .submission-info {
      padding: 14px;
    }
    .submission-title {
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 500;
      color: white;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .submission-author {
      font-size: 0.74rem;
      color: var(--text-muted);
    }

    /* Submission List (Articles) */
    .submission-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .submission-list-item {
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .submission-list-item:hover {
      background: rgba(255, 255, 255, 0.02);
      border-color: rgba(255,255,255,0.15);
    }
    .article-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .article-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 600;
      color: white;
    }
    .article-author {
      font-size: 0.74rem;
      color: var(--text-muted);
    }
    .article-snippet {
      font-size: 0.85rem;
      line-height: 1.5;
      color: var(--text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Admin Moderation Panel */
    .admin-login-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 300px;
    }
    .admin-login-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 30px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    .admin-table th, .admin-table td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .admin-table th {
      font-family: var(--font-display);
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      font-weight: 600;
    }
    .admin-table td {
      font-size: 0.85rem;
    }
    .badge {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 99px;
    }
    .badge.pending {
      color: #fbbf24;
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.2);
    }
    .badge.approved {
      color: #34d399;
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.2);
    }
    .badge.rejected {
      color: #f87171;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.2);
    }
    .btn-action {
      padding: 5px 10px;
      font-size: 0.72rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.15s ease;
      border: 1px solid transparent;
    }
    .btn-approve {
      color: #34d399;
      background: rgba(52, 211, 153, 0.15);
      border-color: rgba(52, 211, 153, 0.25);
    }
    .btn-approve:hover {
      background: #34d399;
      color: black;
    }
    .btn-reject {
      color: #f87171;
      background: rgba(248, 113, 113, 0.15);
      border-color: rgba(248, 113, 113, 0.25);
    }
    .btn-reject:hover {
      background: #f87171;
      color: black;
    }
    .thumbnail-mini {
      width: 46px;
      height: 46px;
      object-fit: cover;
      border-radius: 4px;
      cursor: zoom-in;
    }

    /* Responsive Breakpoints */
    @media (max-width: 1200px) {
      body {
        height: auto;
        overflow-y: auto;
      }
      .container {
        height: auto;
        min-height: 100vh;
        grid-template-rows: auto auto auto auto auto;
        padding: 0 20px;
        gap: 20px;
      }
      .top-nav {
        height: auto;
        min-height: 64px;
        padding: 12px 0;
      }
      .hero-section {
        grid-template-columns: 1fr;
        gap: 24px;
        height: auto;
      }
      .spotlight-image-container {
        height: 300px;
      }
      .scroll-layout {
        grid-template-columns: 1fr;
        height: auto;
      }
      .bottom-row {
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
    }

    @media (max-width: 768px) {
      .top-nav {
        flex-direction: column;
        height: auto;
        padding: 16px 0;
        gap: 12px;
      }
      .clocks {
        flex-direction: row;
        justify-content: center;
        flex-wrap: wrap;
        gap: 12px;
      }
      .spotlight-title {
        font-size: 1.6rem;
      }
      .scroll-card {
        flex-direction: row;
      }
      .scroll-thumb {
        width: 70px;
        height: 70px;
      }
      .scroll-desc {
        display: none; /* Hide descriptions on narrow mobile devices in list view to keep it compact */
      }
      .bottom-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="bg-overlay" id="bgOverlay"></div>
<div class="stars"></div>
<div class="container">
  <header class="top-nav">
    <div class="brand">
      <img class="logo" src="image.jpeg" alt="Navars Logo" />
      <div>
        <span class="brand-name">Navars Edutech • Space Portal</span>
      </div>
    </div>
    <div class="nav-links">
      <button class="nav-link-btn" onclick="openCorner('student')">Student's Corner</button>
      <button class="nav-link-btn" onclick="openCorner('teacher')">Teacher's Corner</button>
      <button class="nav-link-btn" onclick="openAdminPortal()">Admin Portal ⚙️</button>
    </div>
    <div class="clocks">
      <span class="clock-pill" id="clockUtc">UTC --:--:--</span>
      <span class="clock-pill" id="clockLocal">LOCAL --:--:--</span>
      <span class="clock-pill" id="statusText">Initializing…</span>
    </div>
    <div style="display: flex; align-items: center; gap: 20px;">
      <button id="toggleNewsMode" class="btn">📺 Slideshow</button>
    </div>
  </header>

  <main id="news" class="hero-section"></main>

  <hr class="divider" />

  <section class="bottom-row">
    <div class="bottom-col" id="col1"></div>
    <div class="bottom-col" id="col2"></div>
    <div class="bottom-col" id="col3"></div>
    <div class="bottom-col" id="col4"></div>
  </section>

  <footer class="footer-bar">
    <div id="ticker">SYSTEM STATUS: OPERATIONAL</div>
    <div>© 2026 NAVARS EDUTECH • SPACE Operations Portal</div>
  </footer>
</div>

<!-- Generic Glassmorphic Modal Overlay -->
<div class="modal-overlay" id="portalModal">
  <div class="modal-window">
    <header class="modal-header">
      <h2 class="modal-title" id="modalTitle">Student's Corner</h2>
      <button class="modal-close-btn" onclick="closePortalModal()">✕</button>
    </header>
    <div class="modal-body" id="modalBody">
      <!-- Dynamic views go here -->
    </div>
  </div>
</div>

<!-- Image Lightbox Modal for Drawings -->
<div class="lightbox-overlay" id="lightboxModal" onclick="closeLightbox()">
  <img class="lightbox-img" id="lightboxImg" src="" alt="drawing view" />
</div>

<script>
  const REFRESH_MS = 10 * 60 * 1000;
  const $ = (id) => document.getElementById(id);

  let newsList = [];
  let newsIndex = 0;
  let newsTimer = null;
  let newsScrollMode = false;

  let launchesList = [];
  let eventsList = [];
  let bottomIndex = 0;
  let bottomTimer = null;

  function fmtDateTime(v){
    const d = new Date(v);
    return isNaN(d) ? "TBD" : d.toLocaleString([], {
      year:"numeric", month:"short", day:"numeric", hour:"2-digit", minute:"2-digit"
    });
  }

  function fmtDate(v){
    const d = new Date(v);
    return isNaN(d) ? "TBD" : d.toLocaleDateString([], {
      year:"numeric", month:"short", day:"numeric"
    });
  }

  function stripHtml(s=""){
    return String(s).replace(/<[^>]*>/g," ").replace(/\s+/g," ").trim();
  }

  function showNextNews(){
    if(!newsList.length) return;
    const node = $("news");
    if(!node) return;
    
    // Active Spotlight item
    const activeItem = newsList[newsIndex];
    
    // Get the next 4 items in the list for the sidebar fallback
    const listItems = [];
    for (let i = 1; i <= 4; i++) {
      const nextIdx = (newsIndex + i) % newsList.length;
      listItems.push({ item: newsList[nextIdx], globalIndex: nextIdx });
    }
    
    const cleanSummary = stripHtml(activeItem.summary || "");
    const limit = 320; // clean fit
    const shortSummary = cleanSummary.length > limit ? cleanSummary.slice(0,limit) + "..." : cleanSummary;
    
    const hasImg = !!activeItem.imageUrl;
    const activeImgUrl = hasImg ? activeItem.imageUrl : "https://images-assets.nasa.gov/image/PIA03033/PIA03033~medium.jpg";

    // Determine what to show in the sidebar (creative submissions slideshow vs standard news)
    let sidebarHtml = "";
    if (approvedSubmissionsList && approvedSubmissionsList.length > 0) {
      const subCount = approvedSubmissionsList.length;
      const sub = approvedSubmissionsList[submissionIndex % subCount];
      
      const isDrawing = sub.type === 'drawing';
      const typeLabel = `${sub.role === 'student' ? 'Student' : 'Teacher'} ${isDrawing ? 'Drawing' : 'Article'}`;
      
      const clickAction = isDrawing
        ? `viewImage('${sub.content}')`
        : `viewFullArticleFromShowcase('${sub.title}', '${sub.authorName}', '${sub.submittedAt}', '${sub.content}', '${sub.role}')`;
      
      if (isDrawing) {
        sidebarHtml = `
          <div class="sidebar-enlarged-card" onclick="${clickAction}">
            <img class="sidebar-enlarged-img" src="${sub.content}" alt="" />
            <div class="sidebar-enlarged-overlay">
              <div class="story-meta" style="color: #60a5fa; font-weight: 600; margin-bottom:4px;">✨ ${typeLabel.toUpperCase()}</div>
              <div style="font-size:0.85rem; font-weight:700; color:white; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${sub.title}</div>
              <div style="font-size:0.72rem; color:var(--text-muted);">By ${sub.authorName} • Click to expand</div>
            </div>
          </div>
        `;
      } else {
        // PDF article: embed pdf iframe directly in the sidebar so the actual text of the PDF is visible!
        // We use a transparent click-catcher layer on top so that clicking anywhere opens the reader modal.
        sidebarHtml = `
          <div class="sidebar-enlarged-card">
            <div style="position:absolute; inset:0; z-index:10; cursor:pointer;" onclick="${clickAction}"></div>
            <iframe src="${sub.content}#toolbar=0&navpanes=0&scrollbar=0" width="100%" height="100%" style="border: none; background: white; border-radius: 8px; pointer-events: none;"></iframe>
            <div class="sidebar-enlarged-overlay" style="z-index: 20;">
              <div class="story-meta" style="color: #60a5fa; font-weight: 600; margin-bottom:4px;">✨ ${typeLabel.toUpperCase()}</div>
              <div style="font-size:0.85rem; font-weight:700; color:white; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${sub.title}</div>
              <div style="font-size:0.72rem; color:var(--text-muted);">By ${sub.authorName} • Click to read</div>
            </div>
          </div>
        `;
      }
      
      // Advance submission index by 1 for next rotation step
      submissionIndex = (submissionIndex + 1) % subCount;
    } else {
      // Fallback: show standard news list
      sidebarHtml = listItems.map(({ item, globalIndex }) => {
        const cardImg = item.imageUrl || "https://images-assets.nasa.gov/image/PIA03033/PIA03033~medium.jpg";
        return `
          <div class="story-card" onclick="selectSpotlight(${globalIndex})">
            <img class="story-thumb" src="${cardImg}" alt=""
                 onerror="this.src='https://images-assets.nasa.gov/image/PIA03033/PIA03033~medium.jpg'" />
            <div class="story-details">
              <div class="story-meta">${item.source} • ${fmtDate(item.publishedAt)}</div>
              <div class="story-title">${item.title}</div>
            </div>
          </div>
        `;
      }).join("");
    }

    node.innerHTML = `
      <div class="spotlight-text">
        <div class="spotlight-category">${activeItem.source || "Space News"}</div>
        <div class="spotlight-title">${activeItem.title}</div>
        <div class="spotlight-summary">${shortSummary}</div>
        <div class="spotlight-meta">
          ${fmtDateTime(activeItem.publishedAt)}
          ${activeItem.url ? `• <a href="${activeItem.url}" target="_blank" rel="noopener">Read Article ↗</a>` : ""}
        </div>
      </div>
      
      <div class="spotlight-image-container">
        <img class="spotlight-image" src="${activeImgUrl}" alt=""
             onerror="this.src='https://images-assets.nasa.gov/image/PIA03033/PIA03033~medium.jpg'" />
      </div>
      
      <div class="stories-list">
        ${sidebarHtml}
      </div>
    `;
    
    // Increment newsIndex for next rotation
    newsIndex = (newsIndex + 1) % newsList.length;
  }

  window.selectSpotlight = function(idx) {
    if (newsTimer) clearInterval(newsTimer);
    newsIndex = idx;
    showNextNews();
    if (!newsScrollMode) {
      newsTimer = setInterval(showNextNews, 8000);
    }
  }

  function updateNewsView(){
    const node = $("news");
    const btn = $("toggleNewsMode");
    if(!node || !btn) return;

    if (newsScrollMode) {
      if (newsTimer) clearInterval(newsTimer);
      node.className = "scroll-layout";
      btn.classList.add("scroll-mode");
      btn.innerHTML = `<span>📰 Scroll Mode</span>`;
      
      node.innerHTML = newsList.map(n => {
        const cardImg = n.imageUrl || "https://images-assets.nasa.gov/image/PIA03033/PIA03033~medium.jpg";
        return `
          <div class="scroll-card">
            <img class="scroll-thumb" src="${cardImg}" alt=""
                 onerror="this.src='https://images-assets.nasa.gov/image/PIA03033/PIA03033~medium.jpg'" />
            <div class="scroll-details">
              <div class="scroll-meta">${n.source} • ${fmtDateTime(n.publishedAt)}</div>
              <div class="scroll-title">${n.url ? `<a href="${n.url}" target="_blank" rel="noopener">${n.title}</a>` : n.title}</div>
              <div class="scroll-desc">${stripHtml(n.summary || "").slice(0, 160)}...</div>
            </div>
          </div>
        `;
      }).join("");
    } else {
      node.className = "hero-section";
      btn.classList.remove("scroll-mode");
      btn.innerHTML = `<span>📺 Slideshow</span>`;
      if (newsTimer) clearInterval(newsTimer);
      showNextNews();
      newsTimer = setInterval(showNextNews, 8000);
    }
  }

  function rotateBottomRow() {
    if (!launchesList.length && !eventsList.length) return;
    
    const col1 = $("col1");
    const col2 = $("col2");
    const col3 = $("col3");
    const col4 = $("col4");
    if (!col1 || !col2 || !col3 || !col4) return;

    // Cycle launches index
    const l1Idx = bottomIndex % launchesList.length;
    const l2Idx = (bottomIndex + 1) % launchesList.length;

    // Cycle events index
    const e1Idx = bottomIndex % eventsList.length;
    const e2Idx = (bottomIndex + 1) % eventsList.length;

    // Launch 1
    const l1 = launchesList[l1Idx];
    if (l1) {
      col1.innerHTML = `
        <div class="col-header">Launch Tracking</div>
        <div class="col-title">${l1.name}</div>
        <div class="col-desc">${l1.launch_service_provider?.name || "Unknown"} • ${l1.pad?.location?.name || "Unknown"}<br>NET: ${fmtDateTime(l1.net)}</div>
      `;
    } else {
      col1.innerHTML = `<div class="col-header">Launch Tracking</div><div class="col-title">No upcoming launches</div>`;
    }

    // Launch 2
    const l2 = launchesList[l2Idx];
    if (l2) {
      col2.innerHTML = `
        <div class="col-header">Launch Tracking</div>
        <div class="col-title">${l2.name}</div>
        <div class="col-desc">${l2.launch_service_provider?.name || "Unknown"} • ${l2.pad?.location?.name || "Unknown"}<br>NET: ${fmtDateTime(l2.net)}</div>
      `;
    } else {
      col2.innerHTML = `<div class="col-header">Launch Tracking</div><div class="col-title">No upcoming launches</div>`;
    }

    // Event 1
    const e1 = eventsList[e1Idx];
    if (e1) {
      col3.innerHTML = `
        <div class="col-header">Sky Watch</div>
        <div class="col-title">${e1.name}</div>
        <div class="col-desc">${e1.where || "Global"} • ${fmtDate(e1.date)}<br>${stripHtml(e1.note || "").slice(0, 100)}</div>
      `;
    } else {
      col3.innerHTML = `<div class="col-header">Sky Watch</div><div class="col-title">No upcoming events</div>`;
    }

    // Event 2
    const e2 = eventsList[e2Idx];
    if (e2) {
      col4.innerHTML = `
        <div class="col-header">Sky Watch</div>
        <div class="col-title">${e2.name}</div>
        <div class="col-desc">${e2.where || "Global"} • ${fmtDate(e2.date)}<br>${stripHtml(e2.note || "").slice(0, 100)}</div>
      `;
    } else {
      col4.innerHTML = `<div class="col-header">Sky Watch</div><div class="col-title">No upcoming events</div>`;
    }

    // Advance index by 2
    const maxLen = Math.max(launchesList.length, eventsList.length);
    bottomIndex = (bottomIndex + 2) % (maxLen || 2);
  }

  async function safeFetch(url){
    try{
      const r = await fetch(url);
      if(!r.ok) throw new Error(`${url} -> ${r.status}`);
      return await r.json();
    }catch(err){
      return { ok:false, items:[], error:err.message };
    }
  }

  async function loadAll(){
    $("statusText").textContent = "Updating feeds…";

    const [newsRes, launchesRes, eventsRes] = await Promise.all([
      safeFetch("/api/news"),
      safeFetch("/api/launches"),
      safeFetch("/api/events")
    ]);

    const news = newsRes.items || [];
    const launches = launchesRes.items || [];
    const events = eventsRes.items || [];

    newsList = news;
    newsIndex = 0;
    updateNewsView();

    launchesList = launches;
    eventsList = events;
    bottomIndex = 0;
    rotateBottomRow();

    if (bottomTimer) clearInterval(bottomTimer);
    bottomTimer = setInterval(rotateBottomRow, 8000);

    // Refresh homepage showcase
    await loadHomepageShowcase();

    $("ticker").textContent = `SYSTEM STATUS: OPERATIONAL  •  Feeds Synchronized: News (${news.length}) Launches (${launches.length}) Events (${events.length})`;

    const failedCount = [newsRes, launchesRes, eventsRes].filter((x) => x.ok === false).length;
    $("statusText").textContent = failedCount
      ? `Partial update (${failedCount} source issue) • ${new Date().toLocaleTimeString()}`
      : `Last update: ${new Date().toLocaleTimeString()}`;
  }

  function startClocks(){
    const tick = () => {
      const now = new Date();
      $("clockUtc").textContent = "UTC " + now.toISOString().split("T")[1].split(".")[0];
      $("clockLocal").textContent = "LOCAL " + now.toLocaleTimeString();
    };
    tick();
    setInterval(tick, 1000);
  }

  startClocks();
  loadAll();
  setInterval(loadAll, REFRESH_MS);

  const toggleBtn = $("toggleNewsMode");
  if (toggleBtn) {
    toggleBtn.addEventListener("click", () => {
      newsScrollMode = !newsScrollMode;
      updateNewsView();
    });
  }

  // Background brightness is fixed at the optimal value (0.30 opacity) defined in CSS

  // Submissions and moderation state
  let activeCornerTab = "drawings";
  let activeAdminTab = "pending";
  let adminToken = null;
  let uploadedBase64 = "";
  let approvedSubmissionsList = [];
  let submissionIndex = 0;

  window.setAdminTab = function(tab) {
    activeAdminTab = tab;
    loadAdminPortal();
  }

  window.openCorner = function(role) {
    $("portalModal").style.display = "flex";
    fetchSubmissionsAndRender(role);
  }
  
  window.closePortalModal = function() {
    $("portalModal").style.display = "none";
  }

  window.setCornerTab = function(tab, role) {
    activeCornerTab = tab;
    fetchSubmissionsAndRender(role);
  }

  window.viewImage = function(base64) {
    const lightbox = $("lightboxModal");
    const img = $("lightboxImg");
    img.src = base64;
    lightbox.style.display = "flex";
  }

  window.closeLightbox = function() {
    $("lightboxModal").style.display = "none";
  }

  window.fetchSubmissionsAndRender = async function(role) {
    const body = $("modalBody");
    body.innerHTML = `<div style="text-align:center; padding: 40px 0; color: var(--text-muted);">Syncing with space portal...</div>`;
    
    try {
      const res = await fetch("/api/submissions");
      const data = await res.json();
      if (res.ok && data.ok) {
        if (role === 'student') {
          renderStudentCorner(data.items || []);
        } else {
          renderTeacherCorner(data.items || []);
        }
      } else {
        body.innerHTML = `<div style="text-align:center; padding: 40px 0; color:#f87171;">Sync failed: ${data.error}</div>`;
      }
    } catch (err) {
      body.innerHTML = `<div style="text-align:center; padding: 40px 0; color:#f87171;">Network error: ${err.message}</div>`;
    }
  }

  window.renderStudentCorner = function(items) {
    const drawings = items.filter(x => x.role === 'student' && x.type === 'drawing' && x.status === 'approved');
    const articles = items.filter(x => x.role === 'student' && x.type === 'article' && x.status === 'approved');
    
    const body = $("modalBody");
    $("modalTitle").textContent = "Student's Corner";
    
    const headerHtml = `
      <div class="corner-tabs">
        <div class="tab-btn-group">
          <button class="tab-btn ${activeCornerTab === 'drawings' ? 'active' : ''}" onclick="setCornerTab('drawings', 'student')">Artwork Gallery (${drawings.length})</button>
          <button class="tab-btn ${activeCornerTab === 'articles' ? 'active' : ''}" onclick="setCornerTab('articles', 'student')">Student Articles (${articles.length})</button>
        </div>
        <button class="btn" style="border-radius: 8px;" onclick="openSubmitForm('student')">Submit Your Work ➕</button>
      </div>
    `;
    
    let contentHtml = "";
    if (activeCornerTab === 'drawings') {
      if (drawings.length === 0) {
        contentHtml = `<div style="text-align:center; color:var(--text-muted); padding: 40px 0;">No drawings submitted yet. Be the first to submit!</div>`;
      } else {
        contentHtml = `
          <div class="submission-grid">
            ${drawings.map(d => `
              <div class="submission-card" onclick="viewImage('${d.content}')">
                <div class="submission-thumb-wrap">
                  <img class="submission-thumb" src="${d.content}" alt="" loading="lazy" />
                </div>
                <div class="submission-info">
                  <div class="submission-title">${d.title}</div>
                  <div class="submission-author">By ${d.authorName} • ${fmtDate(d.submittedAt)}</div>
                </div>
              </div>
            `).join("")}
          </div>
        `;
      }
    } else {
      if (articles.length === 0) {
        contentHtml = `<div style="text-align:center; color:var(--text-muted); padding: 40px 0;">No articles submitted yet. Be the first to submit!</div>`;
      } else {
        contentHtml = `
          <div class="submission-list">
            ${articles.map(a => `
              <div class="submission-list-item" onclick="viewFullArticle('${a.title}', '${a.authorName}', '${a.submittedAt}', '${a.content}')">
                <div class="article-header">
                  <div class="article-title">${a.title}</div>
                  <div class="article-author">By ${a.authorName} • ${fmtDate(a.submittedAt)}</div>
                </div>
                <div class="article-snippet" style="color: #60a5fa;">📄 PDF Document - Click to read</div>
              </div>
            `).join("")}
          </div>
        `;
      }
    }
    
    body.innerHTML = headerHtml + contentHtml;
  }

  window.viewFullArticle = function(title, author, date, content) {
    const body = $("modalBody");
    const isTeacher = title.includes("Teacher") || author.toLowerCase().includes("teacher") || title.includes("Admin");
    const backRole = isTeacher ? 'teacher' : 'student';
    body.innerHTML = `
      <div style="margin-bottom: 20px; height: 100%; display: flex; flex-direction: column;">
        <div style="margin-bottom: 20px;">
          <button class="btn" style="border-radius: 8px; margin-bottom: 10px;" onclick="fetchSubmissionsAndRender('${backRole}')">← Back</button>
          <h1 style="font-family:var(--font-display); font-size: 1.6rem; font-weight: 600; line-height: 1.25; margin-bottom: 8px;">${title}</h1>
          <div style="font-size: 0.8rem; color:var(--text-muted);">Published by ${author} on ${fmtDateTime(date)}</div>
          <div style="margin-top: 14px; display: flex; gap: 12px;">
            <a href="${content}" target="_blank" class="btn" style="border-radius: 8px; background: white; color: black; border-color:white; text-decoration:none; padding: 6px 16px; font-size:0.8rem; font-weight:600;">Open PDF in New Tab ↗</a>
          </div>
        </div>
        <div style="flex-grow: 1; min-height: 500px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: #111;">
          <iframe src="${content}" width="100%" height="100%" style="border: none; background: white;"></iframe>
        </div>
      </div>
    `;
  }

  window.renderTeacherCorner = function(items) {
    const drawings = items.filter(x => x.role === 'teacher' && x.type === 'drawing' && x.status === 'approved');
    const articles = items.filter(x => x.role === 'teacher' && x.type === 'article' && x.status === 'approved');
    
    const body = $("modalBody");
    $("modalTitle").textContent = "Teacher's Corner";
    
    const headerHtml = `
      <div class="corner-tabs">
        <div class="tab-btn-group">
          <button class="tab-btn ${activeCornerTab === 'drawings' ? 'active' : ''}" onclick="setCornerTab('drawings', 'teacher')">Teacher Gallery (${drawings.length})</button>
          <button class="tab-btn ${activeCornerTab === 'articles' ? 'active' : ''}" onclick="setCornerTab('articles', 'teacher')">Teacher Publications (${articles.length})</button>
        </div>
        <button class="btn" style="border-radius: 8px;" onclick="openSubmitForm('teacher')">Publish Work ➕</button>
      </div>
    `;
    
    let contentHtml = "";
    if (activeCornerTab === 'drawings') {
      if (drawings.length === 0) {
        contentHtml = `<div style="text-align:center; color:var(--text-muted); padding: 40px 0;">No drawings submitted yet.</div>`;
      } else {
        contentHtml = `
          <div class="submission-grid">
            ${drawings.map(d => `
              <div class="submission-card" onclick="viewImage('${d.content}')">
                <div class="submission-thumb-wrap">
                  <img class="submission-thumb" src="${d.content}" alt="" loading="lazy" />
                </div>
                <div class="submission-info">
                  <div class="submission-title">${d.title}</div>
                  <div class="submission-author">By ${d.authorName} • ${fmtDate(d.submittedAt)}</div>
                </div>
              </div>
            `).join("")}
          </div>
        `;
      }
    } else {
      if (articles.length === 0) {
        contentHtml = `<div style="text-align:center; color:var(--text-muted); padding: 40px 0;">No articles submitted yet.</div>`;
      } else {
        contentHtml = `
          <div class="submission-list">
            ${articles.map(a => `
              <div class="submission-list-item" onclick="viewFullArticle('${a.title}', '${a.authorName}', '${a.submittedAt}', '${a.content}')">
                <div class="article-header">
                  <div class="article-title">${a.title}</div>
                  <div class="article-author">By ${a.authorName} • ${fmtDate(a.submittedAt)}</div>
                </div>
                <div class="article-snippet" style="color: #60a5fa;">📄 PDF Document - Click to read</div>
              </div>
            `).join("")}
          </div>
        `;
      }
    }
    
    body.innerHTML = headerHtml + contentHtml;
  }

  window.openSubmitForm = function(role) {
    const body = $("modalBody");
    $("modalTitle").textContent = role === 'student' ? "Submit Your Work" : "Publish Teacher Work";
    uploadedBase64 = "";
    
    body.innerHTML = `
      <form id="submissionForm" onsubmit="event.preventDefault(); submitWork('${role}');" style="max-width: 600px; margin: 0 auto;">
        <div class="form-group">
          <label class="form-label">Your Name</label>
          <input type="text" id="subAuthor" class="form-control" placeholder="e.g. John Doe" required />
        </div>
        
        <div class="form-group">
          <label class="form-label">Title</label>
          <input type="text" id="subTitle" class="form-control" placeholder="Title of your work" required />
        </div>
        
        <div class="form-group">
          <label class="form-label">Type of Submission</label>
          <select id="subType" class="form-control" onchange="toggleFormType(this.value)" required>
            <option value="drawing">Drawing / Space Artwork</option>
            <option value="article">Article / Essay (PDF)</option>
          </select>
        </div>
        
        <div id="imageUploadGroup" class="form-group">
          <label class="form-label">Upload Drawing (Image file)</label>
          <input type="file" id="subFile" class="form-control" accept="image/*" onchange="handleImageUpload(event)" required />
          <div style="font-size: 0.72rem; color: var(--text-muted); margin-top: 6px;">Supported: JPG, PNG, WEBP (Max 15MB)</div>
        </div>
        
        <div id="pdfUploadGroup" class="form-group" style="display:none;">
          <label class="form-label">Upload Article (PDF file)</label>
          <input type="file" id="subPdf" class="form-control" accept="application/pdf" onchange="handleImageUpload(event)" />
          <div style="font-size: 0.72rem; color: var(--text-muted); margin-top: 6px;">Supported: PDF (Max 15MB)</div>
        </div>
        
        <div style="display: flex; gap: 16px; justify-content: flex-end; margin-top: 30px;">
          <button type="button" class="btn" onclick="fetchSubmissionsAndRender('${role}')" style="border-radius: 8px; border-color:transparent;">Cancel</button>
          <button type="submit" class="btn" style="border-radius: 8px; background: white; color: black; border-color:white;">Submit Application</button>
        </div>
      </form>
    `;
  }

  window.toggleFormType = function(val) {
    const imgGroup = $("imageUploadGroup");
    const pdfGroup = $("pdfUploadGroup");
    const subFile = $("subFile");
    const subPdf = $("subPdf");
    
    uploadedBase64 = "";
    if (subFile) subFile.value = "";
    if (subPdf) subPdf.value = "";
    
    if (val === 'drawing') {
      imgGroup.style.display = 'block';
      pdfGroup.style.display = 'none';
      subFile.required = true;
      subPdf.required = false;
    } else {
      imgGroup.style.display = 'none';
      pdfGroup.style.display = 'block';
      subFile.required = false;
      subPdf.required = true;
    }
  }

  window.handleImageUpload = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(evt) {
      uploadedBase64 = evt.target.result;
    };
    reader.readAsDataURL(file);
  }

  window.submitWork = async function(role) {
    const authorName = $("subAuthor").value;
    const title = $("subTitle").value;
    const type = $("subType").value;
    
    if (!uploadedBase64) {
      alert("Please wait for the file to load or upload a valid file.");
      return;
    }
    const content = uploadedBase64;
    
    $("modalBody").innerHTML = `<div style="text-align:center; padding: 40px 0; color: var(--text-muted);">Uploading submission to operations portal...</div>`;
    
    try {
      const res = await fetch("/api/submissions", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ authorName, role, type, title, content })
      });
      const data = await res.json();
      if (data.ok) {
        alert(data.message);
        fetchSubmissionsAndRender(role);
      } else {
        alert("Error: " + data.error);
        openSubmitForm(role);
      }
    } catch (err) {
      alert("Network error: " + err.message);
      openSubmitForm(role);
    }
  }

  window.openAdminPortal = function() {
    $("portalModal").style.display = "flex";
    $("modalTitle").textContent = "Admin Portal Moderation";
    
    if (adminToken) {
      loadAdminPortal();
    } else {
      renderAdminLogin();
    }
  }

  window.renderAdminLogin = function() {
    const body = $("modalBody");
    body.innerHTML = `
      <div class="admin-login-container">
        <div class="admin-login-card">
          <h3 style="font-family: var(--font-display); font-size: 1.1rem; margin-bottom: 20px;">Staff Credentials Required</h3>
          <div class="form-group" style="text-align: left;">
            <label class="form-label">Portal Passcode</label>
            <input type="password" id="adminPasscode" class="form-control" placeholder="Enter Admin Passcode" required />
          </div>
          <div id="adminLoginError" style="color: #f87171; font-size: 0.76rem; margin-bottom: 16px; min-height: 16px;"></div>
          <button class="btn" style="border-radius: 8px; width:100%; background:white; color:black; border-color:white;" onclick="submitAdminLogin()">Verify Passcode</button>
        </div>
      </div>
    `;
  }

  window.submitAdminLogin = async function() {
    const passcode = $("adminPasscode").value;
    const errorDiv = $("adminLoginError");
    if (!passcode) return;
    
    errorDiv.textContent = "Verifying...";
    
    try {
      const res = await fetch("/api/admin/submissions", {
        headers: { "Authorization": passcode }
      });
      const data = await res.json();
      if (res.ok && data.ok) {
        adminToken = passcode;
        loadAdminPortal();
      } else {
        errorDiv.textContent = "Invalid passcode. Access denied.";
      }
    } catch (err) {
      errorDiv.textContent = "Network error: " + err.message;
    }
  }

  window.loadAdminPortal = async function() {
    const body = $("modalBody");
    body.innerHTML = `<div style="text-align:center; padding: 40px 0; color: var(--text-muted);">Fetching database entries...</div>`;
    
    try {
      const res = await fetch("/api/admin/submissions", {
        headers: { "Authorization": adminToken }
      });
      const data = await res.json();
      if (res.ok && data.ok) {
        const items = data.items || [];
        
        // Group items for badge counts
        const pendingItems = items.filter(x => x.status === 'pending');
        const approvedItems = items.filter(x => x.status === 'approved');
        const archivedItems = items.filter(x => x.status === 'archived');
        const rejectedItems = items.filter(x => x.status === 'rejected');
        
        // Filter list based on active tab
        let filteredItems = [];
        if (activeAdminTab === 'pending') filteredItems = pendingItems;
        else if (activeAdminTab === 'approved') filteredItems = approvedItems;
        else if (activeAdminTab === 'archived') filteredItems = archivedItems;
        else if (activeAdminTab === 'rejected') filteredItems = rejectedItems;
        
        const tabsHtml = `
          <div class="corner-tabs" style="margin-bottom: 20px;">
            <div class="tab-btn-group">
              <button class="tab-btn ${activeAdminTab === 'pending' ? 'active' : ''}" onclick="setAdminTab('pending')">Pending Moderation (${pendingItems.length})</button>
              <button class="tab-btn ${activeAdminTab === 'approved' ? 'active' : ''}" onclick="setAdminTab('approved')">Approved / Live (${approvedItems.length})</button>
              <button class="tab-btn ${activeAdminTab === 'archived' ? 'active' : ''}" onclick="setAdminTab('archived')">Archive Folder (${archivedItems.length})</button>
              <button class="tab-btn ${activeAdminTab === 'rejected' ? 'active' : ''}" onclick="setAdminTab('rejected')">Rejected (${rejectedItems.length})</button>
            </div>
          </div>
        `;
        
        if (filteredItems.length === 0) {
          body.innerHTML = tabsHtml + `<div style="text-align:center; padding: 40px 0; color:var(--text-muted);">No entries found under this section.</div>`;
          return;
        }
        
        const tableHtml = `
          <div style="overflow-x: auto;">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Author</th>
                  <th>Role</th>
                  <th>Type</th>
                  <th>Title</th>
                  <th>Content / Preview</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                ${filteredItems.map(item => {
                  const dateStr = fmtDate(item.submittedAt);
                  const isDrawing = item.type === 'drawing';
                  const preview = isDrawing
                    ? `<img class="thumbnail-mini" src="${item.content}" alt="preview" onclick="viewImage('${item.content}')" />`
                    : `<span style="color:var(--text-muted); cursor:pointer; text-decoration:underline;" onclick="viewFullArticle('${item.title} (Admin Preview)', '${item.authorName}', '${item.submittedAt}', '${item.content}')">View PDF</span>`;
                  
                  const statusBadge = `<span class="badge ${item.status}">${item.status}</span>`;
                  
                  let actionButtons = "";
                  if (item.status === 'pending') {
                    actionButtons = `
                      <div style="display:flex; gap: 8px;">
                        <button class="btn-action btn-approve" onclick="moderateSubmission('${item.id}', 'approve')">Approve</button>
                        <button class="btn-action btn-reject" onclick="moderateSubmission('${item.id}', 'reject')">Reject</button>
                      </div>
                    `;
                  } else if (item.status === 'approved') {
                    actionButtons = `
                      <div style="display:flex; gap: 8px;">
                        <button class="btn-action" style="color: #fbbf24; background: rgba(251, 191, 36, 0.15); border-color: rgba(251, 191, 36, 0.25);" onclick="moderateSubmission('${item.id}', 'archive')">Archive</button>
                        <button class="btn-action btn-reject" onclick="moderateSubmission('${item.id}', 'reject')">Reject</button>
                      </div>
                    `;
                  } else if (item.status === 'archived') {
                    actionButtons = `
                      <div style="display:flex; gap: 8px;">
                        <button class="btn-action btn-approve" onclick="moderateSubmission('${item.id}', 'approve')">Publish (Restore)</button>
                        <button class="btn-action btn-reject" onclick="moderateSubmission('${item.id}', 'reject')">Reject</button>
                      </div>
                    `;
                  } else if (item.status === 'rejected') {
                    actionButtons = `
                      <div style="display:flex; gap: 8px;">
                        <button class="btn-action btn-approve" onclick="moderateSubmission('${item.id}', 'approve')">Approve</button>
                        <button class="btn-action" style="color: #fbbf24; background: rgba(251, 191, 36, 0.15); border-color: rgba(251, 191, 36, 0.25);" onclick="moderateSubmission('${item.id}', 'archive')">Archive</button>
                      </div>
                    `;
                  }
                  
                  return `
                    <tr>
                      <td><strong>${item.authorName}</strong><br><span style="font-size:0.7rem; color:var(--text-muted);">${dateStr}</span></td>
                      <td><span style="text-transform:uppercase; font-size:0.74rem;">${item.role}</span></td>
                      <td><span style="text-transform:uppercase; font-size:0.74rem;">${item.type}</span></td>
                      <td>${item.title}</td>
                      <td>${preview}</td>
                      <td>${statusBadge}</td>
                      <td>${actionButtons}</td>
                    </tr>
                  `;
                }).join("")}
              </tbody>
            </table>
          </div>
        `;
        
        body.innerHTML = tabsHtml + tableHtml;
      } else {
        adminToken = null;
        renderAdminLogin();
      }
    } catch (err) {
      body.innerHTML = `<div style="text-align:center; padding: 40px 0; color:#f87171;">Fetch error: ${err.message}</div>`;
    }
  }

  window.moderateSubmission = async function(id, action) {
    try {
      const res = await fetch("/api/admin/submissions/moderate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": adminToken
        },
        body: JSON.stringify({ id, action })
      });
      const data = await res.json();
      if (res.ok && data.ok) {
        loadAdminPortal();
        loadHomepageShowcase();
      } else {
        alert("Moderate failed: " + data.error);
      }
    } catch (err) {
      alert("Moderate error: " + err.message);
    }
  }

  window.loadHomepageShowcase = async function() {
    try {
      const res = await fetch("/api/submissions");
      const data = await res.json();
      if (res.ok && data.ok) {
        const submissions = data.items || [];
        approvedSubmissionsList = submissions.filter(x => x.status === 'approved');
        
        // Re-render sidebar in-place without advancing news Index
        if (newsList.length > 0) {
          newsIndex = (newsIndex - 1 + newsList.length) % newsList.length;
          showNextNews();
        }
      }
    } catch (err) {
      console.error("Homepage showcase fetch error:", err.message);
    }
  };

  window.viewFullArticleFromShowcase = function(title, author, date, content, role) {
    $("portalModal").style.display = "flex";
    $("modalTitle").textContent = role === 'student' ? "Student Publication" : "Teacher Publication";
    
    const body = $("modalBody");
    body.innerHTML = `
      <div style="margin-bottom: 20px; height: 100%; display: flex; flex-direction: column;">
        <div style="margin-bottom: 20px;">
          <button class="btn" style="border-radius: 8px; margin-bottom: 10px;" onclick="closePortalModal()">✕ Close Reader</button>
          <h1 style="font-family:var(--font-display); font-size: 1.6rem; font-weight: 600; line-height: 1.25; margin-bottom: 8px;">${title}</h1>
          <div style="font-size: 0.8rem; color:var(--text-muted);">Published by ${author} on ${fmtDateTime(date)}</div>
          <div style="margin-top: 14px; display: flex; gap: 12px;">
            <a href="${content}" target="_blank" class="btn" style="border-radius: 8px; background: white; color: black; border-color:white; text-decoration:none; padding: 6px 16px; font-size:0.8rem; font-weight:600;">Open PDF in New Tab ↗</a>
          </div>
        </div>
        <div style="flex-grow: 1; min-height: 500px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: #111;">
          <iframe src="${content}" width="100%" height="100%" style="border: none; background: white;"></iframe>
        </div>
      </div>
    `;
  };
</script>
</body>
</html>
