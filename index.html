<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navars Edutech | Space Operations Live</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
    
    :root {
      --bg: #040507;
      --text: #ffffff;
      --text-muted: #8e9cae;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #3b82f6;
      --font-display: 'Outfit', sans-serif;
      --font-sans: 'Inter', sans-serif;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    
    /* Cosmic background JWST Cliffs */
    .bg-overlay {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(to bottom, rgba(4, 5, 7, 0.4), rgba(4, 5, 7, 0.2)),
        url('https://images-assets.nasa.gov/image/carina_nebula/carina_nebula~medium.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      opacity: 0.40;
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.15s ease;
    }

    /* Subtle Twinkling Starfield */
    .stars {
      position: absolute;
      inset: 0;
      background-image: 
        radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 15px);
      background-size: 380px 380px;
      opacity: 0.08;
      animation: space-twinkle 20s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes space-twinkle {
      0% { opacity: 0.05; }
      100% { opacity: 0.12; }
    }
    
    .container {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: grid;
      grid-template-rows: 64px 1fr 1px 200px 32px;
      padding: 0 40px;
    }
    
    /* Header Nav */
    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      height: 100%;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: white;
      padding: 2px;
      object-fit: contain;
    }
    .brand-name {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 1.05rem;
      letter-spacing: 0.5px;
    }
    .clocks {
      display: flex;
      gap: 20px;
    }
    .clock-pill {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }
    .btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-display);
      font-size: 0.72rem;
      font-weight: 500;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .btn:hover {
      background: white;
      color: black;
      border-color: white;
    }
    .btn.scroll-mode {
      background: rgba(59, 130, 246, 0.15);
      border-color: rgba(59, 130, 246, 0.3);
      color: #93c5fd;
    }
    .btn.scroll-mode:hover {
      background: rgba(59, 130, 246, 0.25);
    }
    
    /* Hero Section (Grid: Left text, Center image, Right list) */
    .hero-section {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr 1fr;
      gap: 40px;
      align-items: center;
      padding: 30px 0;
      min-height: 0;
      height: 100%;
    }
    
    /* Left Spotlight Text */
    .spotlight-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
      overflow: hidden;
    }
    .spotlight-category {
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .spotlight-title {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 500;
      line-height: 1.25;
      color: var(--text);
      margin-bottom: 16px;
      letter-spacing: -0.5px;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .spotlight-summary {
      font-size: 0.88rem;
      line-height: 1.6;
      color: var(--text-muted);
      margin-bottom: 24px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .spotlight-meta {
      font-size: 0.72rem;
      color: var(--text-muted);
    }
    .spotlight-meta a {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      margin-left: 8px;
    }
    .spotlight-meta a:hover {
      text-decoration: underline;
    }
    
    /* Center Spotlight Image */
    .spotlight-image-container {
      height: 100%;
      width: 100%;
      border-radius: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .spotlight-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 4px;
      transition: transform 12s ease;
    }
    .spotlight-image-container:hover .spotlight-image {
      transform: scale(1.06);
    }
    
    /* Right Stories List */
    .stories-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      height: 100%;
      justify-content: center;
      overflow-y: auto;
    }
    .story-card {
      display: flex;
      gap: 16px;
      align-items: center;
      cursor: pointer;
      transition: opacity 0.2s ease;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.02);
    }
    .story-card:hover {
      opacity: 0.8;
    }
    .story-thumb {
      width: 76px;
      height: 76px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
      background: #111;
    }
    .story-details {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .story-meta {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .story-title {
      font-family: var(--font-display);
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.3;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    /* Scroll Layout */
    .scroll-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      height: 100%;
      overflow-y: auto;
      padding: 30px 0;
    }
    .scroll-card {
      display: flex;
      gap: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }
    .scroll-thumb {
      width: 90px;
      height: 90px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
      background: #111;
    }
    .scroll-details {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .scroll-meta {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .scroll-title a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      font-family: var(--font-display);
      font-size: 0.95rem;
      line-height: 1.3;
    }
    .scroll-title a:hover {
      text-decoration: underline;
    }
    .scroll-desc {
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Divider */
    .divider {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 0;
    }
    
    /* Bottom 4 Columns Row */
    .bottom-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 30px;
      padding: 10px 0;
      min-height: 0;
    }
    .bottom-col {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
      position: relative;
    }
    .col-header {
      font-size: 0.68rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .icon-container {
      position: absolute;
      right: 4px;
      top: 6px;
      width: 32px;
      height: 32px;
      color: #60a5fa;
      opacity: 0.18;
      transition: opacity 0.2s ease, color 0.2s ease, transform 0.2s ease;
      pointer-events: none;
    }
    .bottom-col:hover .icon-container {
      opacity: 0.55;
      color: #93c5fd;
      transform: scale(1.08);
    }
    .countdown-digits {
      font-family: monospace;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    
    @keyframes rocketLaunch {
      0% { transform: translate(0, 0); }
      50% { transform: translate(3px, -3px); }
      100% { transform: translate(0, 0); }
    }
    .rocket-anim {
      animation: rocketLaunch 4s ease-in-out infinite;
    }

    @keyframes skyTwinkle {
      0%, 100% { opacity: 0.18; transform: scale(1); }
      50% { opacity: 0.50; transform: scale(1.08) rotate(5deg); }
    }
    .sky-anim {
      animation: skyTwinkle 5s ease-in-out infinite;
    }
    .col-title {
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 500;
      line-height: 1.35;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .col-desc {
      font-size: 0.78rem;
      line-height: 1.45;
      color: var(--text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    /* Footer */
    .footer-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.68rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      height: 100%;
    }

    /* Scrollbars styling */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 99px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Brightness Slider Styling */
    .brightness-control {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .brightness-control input[type="range"] {
      -webkit-appearance: none;
      width: 70px;
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 99px;
      outline: none;
      cursor: pointer;
    }
    .brightness-control input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: white;
      transition: background 0.15s ease;
    }
    .brightness-control input[type="range"]::-webkit-slider-thumb:hover {
      background: #60a5fa;
    }

    /* Nav links styles */
    .nav-links {
      display: flex;
      gap: 8px;
    }
    .nav-link-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-display);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 6px;
      transition: all 0.2s ease;
      outline: none;
    }
    .nav-link-btn:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
    }

    /* Modal Overlay Styles */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(15px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    .modal-window {
      background: rgba(10, 15, 26, 0.95);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 95vw;
      max-width: 1420px;
      height: 90vh;
      max-height: 90vh;
      display: grid;
      grid-template-rows: 64px 1fr;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
      animation: modal-zoom 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes modal-zoom {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 30px;
      border-bottom: 1px solid var(--border);
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .modal-close-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 6px;
      transition: color 0.15s ease;
    }
    .modal-close-btn:hover {
      color: white;
    }
    .modal-body {
      padding: 30px;
      overflow-y: auto;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Lightbox Modal */
    .lightbox-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .lightbox-img {
      max-width: 95vw;
      max-height: 95vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
      animation: modal-zoom 0.25s ease-out;
    }

    /* Form Styles */
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .form-control {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: white;
      padding: 12px 16px;
      font-family: var(--font-sans);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s ease;
    }
    .form-control:focus {
      border-color: #3b82f6;
    }
    
    /* Tabs for Student's Corner */
    .corner-tabs {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
      padding-bottom: 12px;
    }
    .tab-btn-group {
      display: flex;
      gap: 16px;
    }
    .tab-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-display);
      font-size: 0.9rem;
      cursor: pointer;
      padding-bottom: 12px;
      position: relative;
    }
    .tab-btn.active {
      color: white;
      font-weight: 600;
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -13px;
      left: 0;
      right: 0;
      height: 2px;
      background: #3b82f6;
    }

    .badge.archived {
      color: #94a3b8;
      background: rgba(148, 163, 184, 0.1);
      border: 1px solid rgba(148, 163, 184, 0.2);
    }

    /* Sidebar Enlarged Showcase Card for Drawings & PDFs */
    .sidebar-enlarged-card {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #090c15;
      transition: border-color 0.2s ease;
      cursor: pointer;
    }
    .sidebar-enlarged-card:hover {
      border-color: rgba(255, 255, 255, 0.2);
    }
    .sidebar-enlarged-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .sidebar-enlarged-overlay {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.9) 60%);
      padding: 16px;
      display: flex;
      flex-direction: column;
    }

    /* Submissions Grid */
    .submission-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 24px;
    }
    .submission-card {
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .submission-card:hover {
      background: rgba(255, 255, 255, 0.02);
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.15);
    }
    .submission-thumb-wrap {
      width: 100%;
      height: 180px;
      overflow: hidden;
      background: #090c15;
    }
    .submission-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .submission-info {
      padding: 14px;
    }
    .submission-title {
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 500;
      color: white;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .submission-author {
      font-size: 0.74rem;
      color: var(--text-muted);
    }

    /* Submission List (Articles) */
    .submission-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .submission-list-item {
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .submission-list-item:hover {
      background: rgba(255, 255, 255, 0.02);
      border-color: rgba(255,255,255,0.15);
    }
    .article-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .article-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 600;
      color: white;
    }
    .article-author {
      font-size: 0.74rem;
      color: var(--text-muted);
    }
    .article-snippet {
      font-size: 0.85rem;
      line-height: 1.5;
      color: var(--text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Admin Moderation Panel */
    .admin-login-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 300px;
    }
    .admin-login-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 30px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    .admin-table th, .admin-table td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .admin-table th {
      font-family: var(--font-display);
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      font-weight: 600;
    }
    .admin-table td {
      font-size: 0.85rem;
    }
    .badge {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 99px;
    }
    .badge.pending {
      color: #fbbf24;
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.2);
    }
    .badge.approved {
      color: #34d399;
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.2);
    }
    .badge.rejected {
      color: #f87171;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.2);
    }
    .btn-action {
      padding: 5px 10px;
      font-size: 0.72rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.15s ease;
      border: 1px solid transparent;
    }
    .btn-approve {
      color: #34d399;
      background: rgba(52, 211, 153, 0.15);
      border-color: rgba(52, 211, 153, 0.25);
    }
    .btn-approve:hover {
      background: #34d399;
      color: black;
    }
    .btn-reject {
      color: #f87171;
      background: rgba(248, 113, 113, 0.15);
      border-color: rgba(248, 113, 113, 0.25);
    }
    .btn-reject:hover {
      background: #f87171;
      color: black;
    }
    .thumbnail-mini {
      width: 46px;
      height: 46px;
      object-fit: cover;
      border-radius: 4px;
      cursor: zoom-in;
    }

    /* Responsive Breakpoints */
    @media (max-width: 1200px) {
      body {
        height: auto;
        overflow-y: auto;
      }
      .container {
        height: auto;
        min-height: 100vh;
        grid-template-rows: auto auto auto auto auto;
        padding: 0 20px;

<script>
  const REFRESH_MS = 10 * 60 * 1000;
  const $ = (id) => document.getElementById(id);

  let newsList = [];
  let newsIndex = 0;
  let newsTimer = null;
  let newsScrollMode = false;

  let launchesList = [];
  let eventsList = [];
  let nextLaunchData = null;
  let nextEventData = null;
  let countdownTimer = null;
  let nextMoonData = null;
  let neosData = [];

  function fmtDateTime(v){
    const d = new Date(v);
    return isNaN(d) ? "TBD" : d.toLocaleString([], {
      year:"numeric", month:"short", day:"numeric", hour:"2-digit", minute:"2-digit"
    });
  }

  function fmtDate(v){
    const d = new Date(v);
    return isNaN(d) ? "TBD" : d.toLocaleDateString([], {
      year:"numeric", month:"short", day:"numeric"
    });
  }

  function stripHtml(s=""){
    return String(s).replace(/<[^>]*>/g," ").replace(/\s+/g," ").trim();
  }

  function showNextNews(){
    if(!newsList.length) return;
    const node = $("news");
    if(!node) return;
    
    // Active Spotlight item
    const activeItem = newsList[newsIndex];
    
    // Get the next 4 items in the list for the sidebar fallback
    const listItems = [];
    for (let i = 1; i <= 4; i++) {
      const nextIdx = (newsIndex + i) % newsList.length;
      listItems.push({ item: newsList[nextIdx], globalIndex: nextIdx });
    }
    
    const cleanSummary = stripHtml(activeItem.summary || "");
    const limit = 320; // clean fit
    const shortSummary = cleanSummary.length > limit ? cleanSummary.slice(0,limit) + "..." : cleanSummary;
    
    const hasImg = !!activeItem.imageUrl;
    const activeImgUrl = hasImg ? activeItem.imageUrl : "https://images-assets.nasa.gov/image/PIA03033/PIA03033~medium.jpg";

    // Determine what to show in the sidebar (creative submissions slideshow vs standard news)
    let sidebarHtml = "";
    if (approvedSubmissionsList && approvedSubmissionsList.length > 0) {
      const subCount = approvedSubmissionsList.length;
      const sub = approvedSubmissionsList[submissionIndex % subCount];
      
      const isDrawing = sub.type === 'drawing';
      const typeLabel = `${sub.role === 'student' ? 'Student' : 'Teacher'} ${isDrawing ? 'Drawing' : 'Article'}`;
      
      const clickAction = isDrawing
        ? `viewImage('${sub.content}', '${sub.title}', '${sub.authorName}', '${sub.schoolName || ''}', '${sub.inchargeName || ''}')`
        : `viewFullArticleFromShowcase('${sub.title}', '${sub.authorName}', '${sub.submittedAt}', '${sub.content}', '${sub.role}', '${sub.schoolName || ''}', '${sub.inchargeName || ''}')`;
      
      if (isDrawing) {
        sidebarHtml = `
          <div class="sidebar-enlarged-card" onclick="${clickAction}">
            <img class="sidebar-enlarged-img" src="${sub.content}" alt="" />
            <div class="sidebar-enlarged-overlay">
              <div class="story-meta" style="color: #60a5fa; font-weight: 600; margin-bottom:4px;">✨ ${typeLabel.toUpperCase()}</div>
              <div style="font-size:0.85rem; font-weight:700; color:white; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${sub.title}</div>
              <div style="font-size:0.72rem; color:var(--text-muted);">By ${sub.authorName} • Click to expand</div>
            </div>
          </div>
        `;
      } else {
        // PDF article: embed pdf iframe directly in the sidebar so the actual text of the PDF is visible!
        // We use a transparent click-catcher layer on top so that clicking anywhere opens the reader modal.
        sidebarHtml = `
          <div class="sidebar-enlarged-card">
            <div style="position:absolute; inset:0; z-index:10; cursor:pointer;" onclick="${clickAction}"></div>
            <iframe src="${sub.content}#toolbar=0&navpanes=0&scrollbar=0" width="100%" height="100%" style="border: none; background: white; border-radius: 8px; pointer-events: none;"></iframe>
            <div class="sidebar-enlarged-overlay" style="z-index: 20;">
              <div class="story-meta" style="color: #60a5fa; font-weight: 600; margin-bottom:4px;">✨ ${typeLabel.toUpperCase()}</div>
              <div style="font-size:0.85rem; font-weight:700; color:white; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${sub.title}</div>
              <div style="font-size:0.72rem; color:var(--text-muted);">By ${sub.authorName} • Click to read</div>
            </div>
          </div>
        `;
      }
      
      // Advance submission index by 1 for next rotation step
      submissionIndex = (submissionIndex + 1) % subCount;
    } else {
      // Fallback: show standard news list
      sidebarHtml = listItems.map(({ item, globalIndex }) => {
        const cardImg = item.imageUrl || "https://images-assets.nasa.gov/image/PIA03033/PIA03033~medium.jpg";
        return `
          <div class="story-card" onclick="selectSpotlight(${globalIndex})">
            <img class="story-thumb" src="${cardImg}" alt=""
                 onerror="this.src='https://images-assets.nasa.gov/image/PIA03033/PIA03033~medium.jpg'" />
            <div class="story-details">
              <div class="story-meta">${item.source} • ${fmtDate(item.publishedAt)}</div>
              <div class="story-title">${item.title}</div>
            </div>
          </div>
        `;
      }).join("");
    }

    node.innerHTML = `
      <div class="spotlight-text">
        <div class="spotlight-category">${activeItem.source || "Space News"}</div>
        <div class="spotlight-title">${activeItem.title}</div>
        <div class="spotlight-summary">${shortSummary}</div>
        <div class="spotlight-meta">
          ${fmtDateTime(activeItem.publishedAt)}
          ${activeItem.url ? `• <a href="${activeItem.url}" target="_blank" rel="noopener">Read Article ↗</a>` : ""}
        </div>
      </div>
      
      <div class="spotlight-image-container">
        <img class="spotlight-image" src="${activeImgUrl}" alt=""
             onerror="this.src='https://images-assets.nasa.gov/image/PIA03033/PIA03033~medium.jpg'" />
      </div>
      
      <div class="stories-list">
        ${sidebarHtml}
      </div>
    `;
    
    // Increment newsIndex for next rotation
    newsIndex = (newsIndex + 1) % newsList.length;
  }

  window.selectSpotlight = function(idx) {
    if (newsTimer) clearInterval(newsTimer);
    newsIndex = idx;
    showNextNews();
    if (!newsScrollMode) {
      newsTimer = setInterval(showNextNews, 8000);
    }
  }

  function updateNewsView(){
    const node = $("news");
    const btn = $("toggleNewsMode");
    if(!node || !btn) return;

    if (newsScrollMode) {
      if (newsTimer) clearInterval(newsTimer);
      node.className = "scroll-layout";
      btn.classList.add("scroll-mode");
      btn.innerHTML = `<span>📰 Scroll Mode</span>`;
      
      node.innerHTML = newsList.map(n => {
        const cardImg = n.imageUrl || "https://images-assets.nasa.gov/image/PIA03033/PIA03033~medium.jpg";
        return `
          <div class="scroll-card">
            <img class="scroll-thumb" src="${cardImg}" alt=""
                 onerror="this.src='https://images-assets.nasa.gov/image/PIA03033/PIA03033~medium.jpg'" />
            <div class="scroll-details">
              <div class="scroll-meta">${n.source} • ${fmtDateTime(n.publishedAt)}</div>
              <div class="scroll-title">${n.url ? `<a href="${n.url}" target="_blank" rel="noopener">${n.title}</a>` : n.title}</div>
              <div class="scroll-desc">${stripHtml(n.summary || "").slice(0, 160)}...</div>
            </div>
          </div>
        `;
      }).join("");
    } else {
      node.className = "hero-section";
      btn.classList.remove("scroll-mode");
      btn.innerHTML = `<span>📺 Slideshow</span>`;
      if (newsTimer) clearInterval(newsTimer);
      showNextNews();
      newsTimer = setInterval(showNextNews, 8000);
    }
  }

  function getRocketImage(launch) {
    if (!launch) return "https://images.unsplash.com/photo-1517976487492-5750f3195933?auto=format&fit=crop&w=150&q=80";
    const name = (launch.name || "").toLowerCase();
    const provider = (launch.launch_service_provider?.name || "").toLowerCase();
    if (name.includes("falcon") || provider.includes("spacex")) {
      return "https://images.unsplash.com/photo-1541185933-ef5d8ed016c2?auto=format&fit=crop&w=150&q=80"; // Falcon 9 launch
    }
    if (provider.includes("isro") || name.includes("pslv") || name.includes("gslv") || name.includes("sslv") || name.includes("lvm")) {
      return "https://images.unsplash.com/photo-1610296669228-602fa827fc1f?auto=format&fit=crop&w=150&q=80"; // Launch rocket
    }
    if (name.includes("artemis") || provider.includes("nasa")) {
      return "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=150&q=80"; // Artemis / Shuttle launch
    }
    return "https://images.unsplash.com/photo-1517976487492-5750f3195933?auto=format&fit=crop&w=150&q=80"; // Generic Launch
  }

  function getCelestialImage(event) {
    if (!event) return "https://images.unsplash.com/photo-1464802686167-b939a6910659?auto=format&fit=crop&w=150&q=80";
    const name = (event.name || "").toLowerCase();
    const note = (event.note || "").toLowerCase();
    const where = (event.where || "").toLowerCase();
    
    if (name.includes("moon") || note.includes("moon") || name.includes("lunar") || name.includes("apollo")) {
      return "https://images.unsplash.com/photo-1522030299830-16b8d3d049fe?auto=format&fit=crop&w=150&q=80"; // Moon photo
    }
    if (name.includes("meteor") || note.includes("meteor") || name.includes("shower") || name.includes("geminids") || name.includes("perseids")) {
      return "https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?auto=format&fit=crop&w=150&q=80"; // Meteor shower
    }
    if (where.includes("india") || name.includes("sarabhai") || name.includes("isro") || name.includes("science day")) {
      return "https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=150&q=80"; // India space tech/satellite globe
    }
    if (name.includes("opposition") || name.includes("conjunction") || name.includes("eclipse") || name.includes("planet") || name.includes("saturn") || name.includes("jupiter")) {
      return "https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?auto=format&fit=crop&w=150&q=80"; // Planet/Earth from space
    }
    return "https://images.unsplash.com/photo-1538370965046-79c0d6907d47?auto=format&fit=crop&w=150&q=80"; // Deep space Carina nebula
  }

  function getMoonPhaseAndIllumination(date = new Date()) {
    const baseNewMoon = new Date("2000-01-06T18:14:00Z").getTime();
    const msPerDay = 24 * 60 * 60 * 1000;
    const synodicMonth = 29.530588853;
    
    const diffDays = (date.getTime() - baseNewMoon) / msPerDay;
    const phaseValue = (diffDays / synodicMonth) % 1.0;
    const age = phaseValue * synodicMonth;
    const illumination = Math.round((1 - Math.cos(2 * Math.PI * phaseValue)) / 2 * 100);
    
    let name = "";
    let emoji = "🌑";
    if (age < 1.845) { name = "New Moon"; emoji = "🌑"; }
    else if (age < 5.537) { name = "Waxing Crescent"; emoji = "🌒"; }
    else if (age < 9.228) { name = "First Quarter"; emoji = "🌓"; }
    else if (age < 12.92) { name = "Waxing Gibbous"; emoji = "🌔"; }
    else if (age < 16.61) { name = "Full Moon"; emoji = "🌕"; }
    else if (age < 20.30) { name = "Waning Gibbous"; emoji = "🌖"; }
    else if (age < 23.99) { name = "Third Quarter"; emoji = "🌗"; }
    else if (age < 27.68) { name = "Waning Crescent"; emoji = "🌘"; }
    else { name = "New Moon"; emoji = "🌑"; }
    
    return { name, illumination, emoji };
  }

  function getSunTimings(date = new Date()) {
    const start = new Date(date.getFullYear(), 0, 0);
    const diff = date - start;
    const oneDay = 1000 * 60 * 60 * 24;
    const dayOfYear = Math.floor(diff / oneDay);
    const angle = (2 * Math.PI * (dayOfYear - 172)) / 365;
    
    const riseOffsetMinutes = Math.sin(angle) * 57.5;
    const riseMinutes = 377.5 + riseOffsetMinutes;
    
    const setOffsetMinutes = Math.sin(angle) * 52.5;
    const setMinutes = 1102.5 - setOffsetMinutes;
    
    const formatTime = (totalMinutes) => {
      const h = Math.floor(totalMinutes / 60);
      const m = Math.floor(totalMinutes % 60);
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    };
    
    return {
      sunrise: formatTime(riseMinutes),
      sunset: formatTime(setMinutes)
    };
  }

  function getMoonTimings(date = new Date()) {
    const baseNewMoon = new Date("2000-01-06T18:14:00Z").getTime();
    const msPerDay = 24 * 60 * 60 * 1000;
    const synodicMonth = 29.530588853;
    
    const diffDays = (date.getTime() - baseNewMoon) / msPerDay;
    const phaseValue = (diffDays / synodicMonth) % 1.0;
    
    const riseMinutes = (6 * 60 + phaseValue * 24 * 60) % (24 * 60);
    const setMinutes = (riseMinutes + 12 * 60) % (24 * 60);
    
    const formatTime = (totalMinutes) => {
      const h = Math.floor(totalMinutes / 60);
      const m = Math.floor(totalMinutes % 60);
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    };
    
    return {
      moonrise: formatTime(riseMinutes),
      moonset: formatTime(setMinutes)
    };
  }

  function getPlanetsTonight(date = new Date()) {
    const month = date.getMonth();
    const visibilityData = [
      // Jan
      [
        { name: "Jupiter", visibility: "Excellent", time: "Sunset to 11:30 PM", color: "#f59e0b" },
        { name: "Venus", visibility: "Good", time: "Dusk (West)", color: "#34d399" },
        { name: "Saturn", visibility: "Fair", time: "Early Evening", color: "#60a5fa" }
      ],
      // Feb
      [
        { name: "Jupiter", visibility: "Excellent", time: "Sunset to 10:00 PM", color: "#f59e0b" },
        { name: "Venus", visibility: "Excellent", time: "Dusk (West)", color: "#34d399" },
        { name: "Mars", visibility: "Fair", time: "Pre-Dawn", color: "#f87171" }

  function formatCountdown(targetDateStr) {
    if (!targetDateStr) return "--d : --h : --m : --s";
    const target = new Date(targetDateStr).getTime();
    const now = new Date().getTime();
    const diff = target - now;
    if (diff <= 0) {
      return "00d : 00h : 00m : 00s";
    }
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
    
    const pad = (num) => String(num).padStart(2, '0');
    return `${pad(days)}d : ${pad(hours)}h : ${pad(minutes)}m : ${pad(seconds)}s`;
  }

  async function safeFetch(url){
    try{
      const r = await fetch(url);
      if(!r.ok) throw new Error(`${url} -> ${r.status}`);
      return await r.json();
    }catch(err){
      return { ok:false, items:[], error:err.message };
    }
  }

    const news = newsRes.items || [];

    const upcomingLaunches = launchesList.filter(l => l.net && new Date(l.net) > now);
    upcomingLaunches.sort((a, b) => new Date(a.net) - new Date(b.net));
    nextLaunchData = upcomingLaunches[0] || launchesList[0] || null;

    // Filter and find the closest upcoming celestial event (using YYYY-MM-DD comparison to show today's events)
    const pad2 = (num) => String(num).padStart(2, '0');
    const todayStr = `${now.getFullYear()}-${pad2(now.getMonth() + 1)}-${pad2(now.getDate())}`;
    const upcomingEvents = eventsList.filter(e => {
      if (!e.date) return false;
      const eventDate = new Date(e.date);
      if (isNaN(eventDate)) return false;
      const eventStr = `${eventDate.getFullYear()}-${pad2(eventDate.getMonth() + 1)}-${pad2(eventDate.getDate())}`;
      return eventStr >= todayStr;
    });
    upcomingEvents.sort((a, b) => new Date(a.date) - new Date(b.date));

        contentHtml = `<div style="text-align:center; color:var(--text-muted); padding: 40px 0;">No drawings submitted yet. Be the first to submit!</div>`;
      } else {
        contentHtml = `
          <div class="submission-grid">
            ${drawings.map(d => `
              <div class="submission-card" onclick="viewImage('${d.content}')">
                <div class="submission-thumb-wrap">
                  <img class="submission-thumb" src="${d.content}" alt="" loading="lazy" />
                </div>
                <div class="submission-info">
                  <div class="submission-title">${d.title}</div>
                  <div class="submission-author">By ${d.authorName} • ${fmtDate(d.submittedAt)}</div>
                </div>
              </div>
            `).join("")}
          </div>
        `;
      }
    } else {
      if (articles.length === 0) {
        contentHtml = `<div style="text-align:center; color:var(--text-muted); padding: 40px 0;">No articles submitted yet. Be the first to submit!</div>`;
      } else {
        contentHtml = `
          <div class="submission-list">
            ${articles.map(a => `
              <div class="submission-list-item" onclick="viewFullArticle('${a.title}', '${a.authorName}', '${a.submittedAt}', '${a.content}', '${a.schoolName || ''}', '${a.inchargeName || ''}')">
                <div class="article-header">
                  <div class="article-title">${a.title}</div>
                  <div class="article-author">By ${a.authorName} • ${fmtDate(a.submittedAt)}</div>
                </div>
                <div class="article-snippet" style="color: #60a5fa;">📄 PDF Document - Click to read</div>
              </div>
            `).join("")}
          </div>
        `;
      }
    }
    
    body.innerHTML = headerHtml + contentHtml;
  }

  window.viewFullArticle = function(title, author, date, content, schoolName = '', inchargeName = '') {
    const body = $("modalBody");
    const isTeacher = title.includes("Teacher") || author.toLowerCase().includes("teacher") || title.includes("Admin");
    const backRole = isTeacher ? 'teacher' : 'student';
    body.innerHTML = `
      <div style="margin-bottom: 20px; height: 100%; display: flex; flex-direction: column;">
        <div style="margin-bottom: 20px;">
          <button class="btn" style="border-radius: 8px; margin-bottom: 10px;" onclick="fetchSubmissionsAndRender('${backRole}')">← Back</button>
          <h1 style="font-family:var(--font-display); font-size: 1.6rem; font-weight: 600; line-height: 1.25; margin-bottom: 8px;">${title}</h1>
          <div style="font-size: 0.8rem; color:var(--text-muted);">
            Published by <strong>${author}</strong> on ${fmtDateTime(date)}
            ${schoolName ? `<br><span style="color:#60a5fa; font-weight: 500;">School: ${schoolName}</span>` : ""}
            ${inchargeName ? ` • <span style="color:var(--text-muted);">Space Lab Educator: ${inchargeName}</span>` : ""}
          </div>
          <div style="margin-top: 14px; display: flex; gap: 12px;">
            <a href="${content}" target="_blank" class="btn" style="border-radius: 8px; background: white; color: black; border-color:white; text-decoration:none; padding: 6px 16px; font-size:0.8rem; font-weight:600;">Open PDF in New Tab ↗</a>
          </div>
        </div>
        <div style="flex-grow: 1; min-height: 500px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: #111;">
          <iframe src="${content}" width="100%" height="100%" style="border: none; background: white;"></iframe>
        </div>
      </div>
    `;
  }

  window.renderTeacherCorner = function(items) {
    const drawings = items.filter(x => x.role === 'teacher' && x.type === 'drawing' && x.status === 'approved');
    const articles = items.filter(x => x.role === 'teacher' && x.type === 'article' && x.status === 'approved');
    
    const body = $("modalBody");
    $("modalTitle").textContent = "Teacher's Corner";
    
    const headerHtml = `
      <div class="corner-tabs">
        <div class="tab-btn-group">
          <button class="tab-btn ${activeCornerTab === 'drawings' ? 'active' : ''}" onclick="setCornerTab('drawings', 'teacher')">Teacher Gallery (${drawings.length})</button>
          <button class="tab-btn ${activeCornerTab === 'articles' ? 'active' : ''}" onclick="setCornerTab('articles', 'teacher')">Teacher Publications (${articles.length})</button>
        </div>
        <button class="btn" style="border-radius: 8px;" onclick="openSubmitForm('teacher')">Publish Work ➕</button>
      </div>
    `;
    
    let contentHtml = "";
    if (activeCornerTab === 'drawings') {
      if (drawings.length === 0) {
        contentHtml = `<div style="text-align:center; color:var(--text-muted); padding: 40px 0;">No drawings submitted yet.</div>`;
      } else {
        contentHtml = `
          <div class="submission-grid">
            ${drawings.map(d => `
              <div class="submission-card" onclick="viewImage('${d.content}', '${d.title}', '${d.authorName}', '${d.schoolName || ''}', '${d.inchargeName || ''}')">
                <div class="submission-thumb-wrap">
                  <img class="submission-thumb" src="${d.content}" alt="" loading="lazy" />
                </div>
                <div class="submission-info">
                  <div class="submission-title">${d.title}</div>
                  <div class="submission-author">By ${d.authorName} • ${fmtDate(d.submittedAt)}</div>
                </div>
              </div>
            `).join("")}
          </div>
        `;
      }
    } else {
      if (articles.length === 0) {
        contentHtml = `<div style="text-align:center; color:var(--text-muted); padding: 40px 0;">No articles submitted yet.</div>`;
      } else {
        contentHtml = `
          <div class="submission-list">
            ${articles.map(a => `
              <div class="submission-list-item" onclick="viewFullArticle('${a.title}', '${a.authorName}', '${a.submittedAt}', '${a.content}', '${a.schoolName || ''}', '${a.inchargeName || ''}')">
                <div class="article-header">
                  <div class="article-title">${a.title}</div>
                  <div class="article-author">By ${a.authorName} • ${fmtDate(a.submittedAt)}</div>
                </div>
                <div class="article-snippet" style="color: #60a5fa;">📄 PDF Document - Click to read</div>
              </div>
            `).join("")}
          </div>
        `;
      }
    }
    
    body.innerHTML = headerHtml + contentHtml;
  }

  window.openSubmitForm = function(role) {
    const body = $("modalBody");
    $("modalTitle").textContent = role === 'student' ? "Submit Your Work" : "Publish Teacher Work";
    uploadedBase64 = "";
    
    body.innerHTML = `
      <form id="submissionForm" onsubmit="event.preventDefault(); submitWork('${role}');" style="max-width: 600px; margin: 0 auto;">
        <div class="form-group">
          <label class="form-label">Your Name</label>
          <input type="text" id="subAuthor" class="form-control" placeholder="e.g. John Doe" required />
        </div>
        
        <div class="form-group">
          <label class="form-label">Title</label>
          <input type="text" id="subTitle" class="form-control" placeholder="Title of your work" required />
        </div>

        <div class="form-group">
          <label class="form-label">School Name</label>
          <input type="text" id="subSchool" class="form-control" placeholder="e.g. Oakridge International School" required />
        </div>

        <div class="form-group">
          <label class="form-label">Space Lab Incharge / Educator</label>
          <input type="text" id="subIncharge" class="form-control" placeholder="e.g. Mr. Kshitij Pawar" required />
        </div>
        
        <div class="form-group">
          <label class="form-label">Type of Submission</label>
          <select id="subType" class="form-control" onchange="toggleFormType(this.value)" required>
            <option value="drawing">Drawing / Space Artwork</option>
            <option value="article">Article / Essay (PDF)</option>
          </select>
        </div>
        
        <div id="imageUploadGroup" class="form-group">
          <label class="form-label">Upload Drawing (Image file)</label>
          <input type="file" id="subFile" class="form-control" accept="image/*" onchange="handleImageUpload(event)" required />
          <div style="font-size: 0.72rem; color: var(--text-muted); margin-top: 6px;">Supported: JPG, PNG, WEBP (Max 15MB)</div>
        </div>
        
        <div id="pdfUploadGroup" class="form-group" style="display:none;">
          <label class="form-label">Upload Article (PDF file)</label>
          <input type="file" id="subPdf" class="form-control" accept="application/pdf" onchange="handleImageUpload(event)" />
          <div style="font-size: 0.72rem; color: var(--text-muted); margin-top: 6px;">Supported: PDF (Max 15MB)</div>
        </div>
        
        <div style="display: flex; gap: 16px; justify-content: flex-end; margin-top: 30px;">
          <button type="button" class="btn" onclick="fetchSubmissionsAndRender('${role}')" style="border-radius: 8px; border-color:transparent;">Cancel</button>
          <button type="submit" class="btn" style="border-radius: 8px; background: white; color: black; border-color:white;">Submit Application</button>
        </div>
      </form>
    `;
  }

  window.toggleFormType = function(val) {
    const imgGroup = $("imageUploadGroup");
    const pdfGroup = $("pdfUploadGroup");
    const subFile = $("subFile");
    const subPdf = $("subPdf");
    
    uploadedBase64 = "";
    if (subFile) subFile.value = "";
    if (subPdf) subPdf.value = "";
    
    if (val === 'drawing') {
      imgGroup.style.display = 'block';
      pdfGroup.style.display = 'none';
      subFile.required = true;
      subPdf.required = false;
    } else {
      imgGroup.style.display = 'none';
      pdfGroup.style.display = 'block';
      subFile.required = false;
      subPdf.required = true;
    }
  }

  window.handleImageUpload = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(evt) {
      uploadedBase64 = evt.target.result;
    };
    reader.readAsDataURL(file);
  }

  window.submitWork = async function(role) {
    const authorName = $("subAuthor").value;
    const title = $("subTitle").value;
    const type = $("subType").value;
    const schoolName = $("subSchool").value;
    const inchargeName = $("subIncharge").value;
    
    if (!uploadedBase64) {
      alert("Please wait for the file to load or upload a valid file.");
      return;
    }
    const content = uploadedBase64;
    
    $("modalBody").innerHTML = `<div style="text-align:center; padding: 40px 0; color: var(--text-muted);">Uploading submission to operations portal...</div>`;
    
    try {
      const res = await fetch("/api/submissions", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ authorName, role, type, title, content, schoolName, inchargeName })
      });
      const data = await res.json();
      if (data.ok) {
        alert(data.message);
        fetchSubmissionsAndRender(role);
      } else {
        alert("Error: " + data.error);
        openSubmitForm(role);
      }
    } catch (err) {
      alert("Network error: " + err.message);
      openSubmitForm(role);
    }
  }

  window.openAdminPortal = function() {
    $("portalModal").style.display = "flex";
    $("modalTitle").textContent = "Admin Portal Moderation";
    
    if (adminToken) {
      loadAdminPortal();
    } else {
      renderAdminLogin();
    }
  }

  window.renderAdminLogin = function() {
    const body = $("modalBody");
    body.innerHTML = `
      <div class="admin-login-container">
        <div class="admin-login-card">
          <h3 style="font-family: var(--font-display); font-size: 1.1rem; margin-bottom: 20px;">Staff Credentials Required</h3>
          <div class="form-group" style="text-align: left;">
            <label class="form-label">Portal Passcode</label>
            <input type="password" id="adminPasscode" class="form-control" placeholder="Enter Admin Passcode" required />
          </div>
          <div id="adminLoginError" style="color: #f87171; font-size: 0.76rem; margin-bottom: 16px; min-height: 16px;"></div>
          <button class="btn" style="border-radius: 8px; width:100%; background:white; color:black; border-color:white;" onclick="submitAdminLogin()">Verify Passcode</button>
        </div>
      </div>
    `;
  }

  window.submitAdminLogin = async function() {
    const passcode = $("adminPasscode").value;
    const errorDiv = $("adminLoginError");
    if (!passcode) return;
    
    errorDiv.textContent = "Verifying...";
    
    try {
      const res = await fetch("/api/admin/submissions", {
        headers: { "Authorization": passcode }
      });
      const data = await res.json();
      if (res.ok && data.ok) {
        adminToken = passcode;
        loadAdminPortal();
      } else {
        errorDiv.textContent = "Invalid passcode. Access denied.";
      }
    } catch (err) {
      errorDiv.textContent = "Network error: " + err.message;
    }
  }

  window.loadAdminPortal = async function() {
    const body = $("modalBody");
    body.innerHTML = `<div style="text-align:center; padding: 40px 0; color: var(--text-muted);">Fetching database entries...</div>`;
    
    try {
      const res = await fetch("/api/admin/submissions", {
        headers: { "Authorization": adminToken }
      });
      const data = await res.json();
      if (res.ok && data.ok) {
        const items = data.items || [];
        
        // Group items for badge counts
        const pendingItems = items.filter(x => x.status === 'pending');
        const approvedItems = items.filter(x => x.status === 'approved');
        const archivedItems = items.filter(x => x.status === 'archived');
        const rejectedItems = items.filter(x => x.status === 'rejected');
        
        // Filter list based on active tab
        let filteredItems = [];
        if (activeAdminTab === 'pending') filteredItems = pendingItems;
        else if (activeAdminTab === 'approved') filteredItems = approvedItems;
        else if (activeAdminTab === 'archived') filteredItems = archivedItems;
        else if (activeAdminTab === 'rejected') filteredItems = rejectedItems;
        
        const tabsHtml = `
          <div class="corner-tabs" style="margin-bottom: 20px;">
            <div class="tab-btn-group">
              <button class="tab-btn ${activeAdminTab === 'pending' ? 'active' : ''}" onclick="setAdminTab('pending')">Pending Moderation (${pendingItems.length})</button>
              <button class="tab-btn ${activeAdminTab === 'approved' ? 'active' : ''}" onclick="setAdminTab('approved')">Approved / Live (${approvedItems.length})</button>
              <button class="tab-btn ${activeAdminTab === 'archived' ? 'active' : ''}" onclick="setAdminTab('archived')">Archive Folder (${archivedItems.length})</button>
              <button class="tab-btn ${activeAdminTab === 'rejected' ? 'active' : ''}" onclick="setAdminTab('rejected')">Rejected (${rejectedItems.length})</button>
            </div>
          </div>
        `;
        
        if (filteredItems.length === 0) {
          body.innerHTML = tabsHtml + `<div style="text-align:center; padding: 40px 0; color:var(--text-muted);">No entries found under this section.</div>`;
          return;
        }
        
        const tableHtml = `
          <div style="overflow-x: auto;">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Author</th>
                  <th>Role</th>
                  <th>Type</th>
                  <th>Title</th>
                  <th>Content / Preview</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                ${filteredItems.map(item => {
                  const dateStr = fmtDate(item.submittedAt);
                  const isDrawing = item.type === 'drawing';
                  const preview = isDrawing
                    ? `<img class="thumbnail-mini" src="${item.content}" alt="preview" onclick="viewImage('${item.content}', '${item.title}', '${item.authorName}', '${item.schoolName || ''}', '${item.inchargeName || ''}')" />`
                    : `<span style="color:var(--text-muted); cursor:pointer; text-decoration:underline;" onclick="viewFullArticle('${item.title} (Admin Preview)', '${item.authorName}', '${item.submittedAt}', '${item.content}', '${item.schoolName || ''}', '${item.inchargeName || ''}')">View PDF</span>`;
                  
                  const statusBadge = `<span class="badge ${item.status}">${item.status}</span>`;
                  
                  let actionButtons = "";
                  if (item.status === 'pending') {
                    actionButtons = `
                      <div style="display:flex; gap: 8px;">
                        <button class="btn-action btn-approve" onclick="moderateSubmission('${item.id}', 'approve')">Approve</button>
                        <button class="btn-action btn-reject" onclick="moderateSubmission('${item.id}', 'reject')">Reject</button>
                      </div>
                    `;
                  } else if (item.status === 'approved') {
                    actionButtons = `
                      <div style="display:flex; gap: 8px;">
                        <button class="btn-action" style="color: #fbbf24; background: rgba(251, 191, 36, 0.15); border-color: rgba(251, 191, 36, 0.25);" onclick="moderateSubmission('${item.id}', 'archive')">Archive</button>
                        <button class="btn-action btn-reject" onclick="moderateSubmission('${item.id}', 'reject')">Reject</button>
                      </div>
                    `;
                  } else if (item.status === 'archived') {
                    actionButtons = `
                      <div style="display:flex; gap: 8px;">
                        <button class="btn-action btn-approve" onclick="moderateSubmission('${item.id}', 'approve')">Publish (Restore)</button>
                        <button class="btn-action btn-reject" onclick="moderateSubmission('${item.id}', 'reject')">Reject</button>
                      </div>
                    `;
                  } else if (item.status === 'rejected') {
                    actionButtons = `
                      <div style="display:flex; gap: 8px;">
                        <button class="btn-action btn-approve" onclick="moderateSubmission('${item.id}', 'approve')">Approve</button>
                        <button class="btn-action" style="color: #fbbf24; background: rgba(251, 191, 36, 0.15); border-color: rgba(251, 191, 36, 0.25);" onclick="moderateSubmission('${item.id}', 'archive')">Archive</button>
                      </div>
                    `;
                  }
                  
                  return `
                    <tr>
                      <td>
                        <strong>${item.authorName}</strong><br>
                        <span style="font-size:0.75rem; color:#60a5fa; font-weight: 500;">School: ${item.schoolName || 'N/A'}</span><br>
                        <span style="font-size:0.7rem; color:var(--text-muted);">Incharge/Educator: ${item.inchargeName || 'N/A'}</span><br>
                        <span style="font-size:0.65rem; color:#888;">${dateStr}</span>
                      </td>
                      <td><span style="text-transform:uppercase; font-size:0.74rem;">${item.role}</span></td>
                      <td><span style="text-transform:uppercase; font-size:0.74rem;">${item.type}</span></td>
                      <td>${item.title}</td>
                      <td>${preview}</td>
                      <td>${statusBadge}</td>
                      <td>${actionButtons}</td>
                    </tr>
                  `;
                }).join("")}
              </tbody>
            </table>
          </div>
        `;
        
        body.innerHTML = tabsHtml + tableHtml;
      } else {
        adminToken = null;
        renderAdminLogin();
      }
    } catch (err) {
      body.innerHTML = `<div style="text-align:center; padding: 40px 0; color:#f87171;">Fetch error: ${err.message}</div>`;
    }
  }

  window.moderateSubmission = async function(id, action) {
    try {
      const res = await fetch("/api/admin/submissions/moderate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": adminToken
        },
        body: JSON.stringify({ id, action })
      });
      const data = await res.json();
      if (res.ok && data.ok) {
        loadAdminPortal();
        loadHomepageShowcase();
      } else {
        alert("Moderate failed: " + data.error);
      }
    } catch (err) {
      alert("Moderate error: " + err.message);
    }
  }

  window.loadHomepageShowcase = async function() {
    try {
      const res = await fetch("/api/submissions");
      const data = await res.json();
      if (res.ok && data.ok) {
        const submissions = data.items || [];
        approvedSubmissionsList = submissions.filter(x => x.status === 'approved');
        
        // Re-render sidebar in-place without advancing news Index
        if (newsList.length > 0) {
          newsIndex = (newsIndex - 1 + newsList.length) % newsList.length;
          showNextNews();
        }
      }
    } catch (err) {
      console.error("Homepage showcase fetch error:", err.message);
    }
  };

    $("portalModal").style.display = "flex";
    $("modalTitle").textContent = role === 'student' ? "Student Publication" : "Teacher Publication";
    
    const body = $("modalBody");
    body.innerHTML = `
      <div style="margin-bottom: 20px; height: 100%; display: flex; flex-direction: column;">
        <div style="margin-bottom: 20px;">
          <button class="btn" style="border-radius: 8px; margin-bottom: 10px;" onclick="closePortalModal()">✕ Close Reader</button>
          <h1 style="font-family:var(--font-display); font-size: 1.6rem; font-weight: 600; line-height: 1.25; margin-bottom: 8px;">${title}</h1>
          <div style="font-size: 0.8rem; color:var(--text-muted);">
            Published by <strong>${author}</strong> on ${fmtDateTime(date)}
            ${schoolName ? `<br><span style="color:#60a5fa; font-weight: 500;">School: ${schoolName}</span>` : ""}
            ${inchargeName ? ` • <span style="color:var(--text-muted);">Space Lab Educator: ${inchargeName}</span>` : ""}
          </div>
          <div style="margin-top: 14px; display: flex; gap: 12px;">
            <a href="${content}" target="_blank" class="btn" style="border-radius: 8px; background: white; color: black; border-color:white; text-decoration:none; padding: 6px 16px; font-size:0.8rem; font-weight:600;">Open PDF in New Tab ↗</a>
          </div>
        </div>
        <div style="flex-grow: 1; min-height: 500px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: #111;">
          <iframe src="${content}" width="100%" height="100%" style="border: none; background: white;"></iframe>
        </div>
      </div>
    `;
  };
</script>
</body>
</html>
