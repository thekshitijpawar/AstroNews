<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navars Edutech | Space Operations Live</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
    
    :root {
      --bg: #040507;
      --text: #ffffff;
      --text-muted: #8e9cae;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #3b82f6;
      --font-display: 'Outfit', sans-serif;
      --font-sans: 'Inter', sans-serif;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    
    /* Live Cosmic Video Background (YouTube: ztVV54sPOns) */
    .bg-overlay {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none !important;
      user-select: none !important;
      z-index: 0;
      background: #040507;
    }
    
    .bg-video-scrim {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(4, 5, 7, 0.40), rgba(4, 5, 7, 0.20));
      z-index: 1;
      pointer-events: none !important;
    }

    .bg-video-element, .bg-video-iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 115vw;
      height: 64.68vw;
      min-height: 115vh;
      min-width: 204vh;
      transform: translate(-50%, -50%);
      pointer-events: none !important;
      user-select: none !important;
      opacity: 0.45;
      z-index: 0;
      border: none;
      outline: none;
      object-fit: cover;
    }

    /* Subtle Twinkling Starfield */
    .stars {
      position: absolute;
      inset: 0;
      background-image: 
        radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 15px);
      background-size: 380px 380px;
      opacity: 0.08;
      animation: space-twinkle 20s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes space-twinkle {
      0% { opacity: 0.05; }
      100% { opacity: 0.12; }
    }
    
    .container {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: grid;
      grid-template-rows: 52px 1fr auto 30px;
      gap: 14px;
      padding: 0 40px;
    }
    
    /* Header Nav */
    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      height: 100%;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: white;
      padding: 2px;
      object-fit: contain;
    }
    .brand-name {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 1.05rem;
      letter-spacing: 0.5px;
    }
    .clocks {
      display: flex;
      gap: 20px;
    }
    .clock-pill {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }
    .btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-display);
      font-size: 0.72rem;
      font-weight: 500;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .btn:hover {
      background: white;
      color: black;
      border-color: white;
    }
    .btn.scroll-mode {
      background: rgba(59, 130, 246, 0.15);
      border-color: rgba(59, 130, 246, 0.3);
      color: #93c5fd;
    }
    .btn.scroll-mode:hover {
      background: rgba(59, 130, 246, 0.25);
    }
    
    /* Hero Section: 2 Columns (Main News Box on left, Widget/Stories on right) */
    .hero-section {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      align-items: stretch;
      padding: 12px 0;
      min-height: 0;
      height: 100%;
    }

    /* Combined Main Spotlight Card (Semi-transparent rounded glass box) */
    .spotlight-main-card {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 24px;
      align-items: center;
      background: rgba(10, 15, 26, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 14px;
      padding: 22px 26px;
      backdrop-filter: blur(14px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      height: 100%;
      overflow: hidden;
    }
    
    /* Left Spotlight Text */
    .spotlight-text {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      height: 100%;
      overflow: hidden;
    }
    .spotlight-category {
      font-family: var(--font-display);
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .spotlight-title {
      font-family: var(--font-display);
      font-size: 1.45rem;
      font-weight: 600;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .spotlight-summary {
      font-size: 0.92rem;
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.88);
      margin-bottom: 14px;
      flex: 1;
      overflow-y: auto;
      display: block;
      padding-right: 4px;
    }
    .spotlight-meta {
      font-size: 0.72rem;
      color: var(--text-muted);
    }
    .spotlight-meta a {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      margin-left: 8px;
    }
    .spotlight-meta a:hover {
      text-decoration: underline;
    }
    
    /* Center Spotlight Image */
    .spotlight-image-container {
      height: 100%;
      width: 100%;
      border-radius: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .spotlight-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 4px;
      transition: transform 12s ease;
    }
    .spotlight-image-container:hover .spotlight-image {
      transform: scale(1.06);
    }
    
    /* Right Stories List / Showcase Panel (Semi-transparent rounded glass box) */
    .stories-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      height: 100%;
      justify-content: center;
      overflow-y: auto;
      background: rgba(10, 15, 26, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 14px;
      padding: 12px;
      backdrop-filter: blur(14px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
    }
    .story-card {
      display: flex;
      gap: 16px;
      align-items: center;
      cursor: pointer;
      transition: opacity 0.2s ease;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.02);
    }
    .story-card:hover {
      opacity: 0.8;
    }
    .story-thumb {
      width: 76px;
      height: 76px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
      background: #111;
    }
    .story-details {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .story-meta {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .story-title {
      font-family: var(--font-display);
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.3;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    /* Scroll Layout */
    .scroll-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      height: 100%;
      overflow-y: auto;
      padding: 30px 0;
    }
    .scroll-card {
      display: flex;
      gap: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }
    .scroll-thumb {
      width: 90px;
      height: 90px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
      background: #111;
    }
    .scroll-details {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .scroll-meta {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .scroll-title a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      font-family: var(--font-display);
      font-size: 0.95rem;
      line-height: 1.3;
    }
    .scroll-title a:hover {
      text-decoration: underline;
    }
    .scroll-desc {
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Divider */
    .divider {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 0;
    }
    
    /* Bottom 4 Columns Row */
    .bottom-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      padding: 0;
      min-height: 0;
    }
    .bottom-col {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 6px;
      min-width: 0;
      position: relative;
      background: rgba(10, 15, 26, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 14px;
      padding: 12px 16px;
      backdrop-filter: blur(14px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      transition: all 0.25s ease;
    }
    .bottom-col:hover {
      border-color: rgba(255, 255, 255, 0.22);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
    }
    #col1 { border-top: 3.5px solid #fde047; }
    #col2 { border-top: 3.5px solid #60a5fa; }
    #col3 { border-top: 3.5px solid #a855f7; }
    #col4 { border-top: 3.5px solid #34d399; }
    .col-header {
      font-size: 0.68rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .icon-container {
      position: absolute;
      right: 4px;
      top: 6px;
      width: 32px;
      height: 32px;
      color: #60a5fa;
      opacity: 0.18;
      transition: opacity 0.2s ease, color 0.2s ease, transform 0.2s ease;
      pointer-events: none;
    }
    .bottom-col:hover .icon-container {
      opacity: 0.55;
      color: #93c5fd;
      transform: scale(1.08);
    }
    .countdown-digits {
      font-family: monospace;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    
    @keyframes rocketLaunch {
      0% { transform: translate(0, 0); }
      50% { transform: translate(3px, -3px); }
      100% { transform: translate(0, 0); }
    }
    .rocket-anim {
      animation: rocketLaunch 4s ease-in-out infinite;
    }

    @keyframes skyTwinkle {
      0%, 100% { opacity: 0.18; transform: scale(1); }
      50% { opacity: 0.50; transform: scale(1.08) rotate(5deg); }
    }
    .sky-anim {
      animation: skyTwinkle 5s ease-in-out infinite;
    }
    .col-title {
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 500;
      line-height: 1.35;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .col-desc {
      font-size: 0.78rem;
      line-height: 1.45;
      color: var(--text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    /* Footer */
    .footer-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.60rem;
      color: var(--text-muted);
      border-top: 1px solid rgba(255,255,255,0.06);
      height: 100%;
      padding: 0 2px;
    }

    /* Scrollbars styling */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 99px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Brightness Slider Styling */
    .brightness-control {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .brightness-control input[type="range"] {
      -webkit-appearance: none;
      width: 70px;
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 99px;
      outline: none;
      cursor: pointer;
    }
    .brightness-control input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: white;
      transition: background 0.15s ease;
    }
    .brightness-control input[type="range"]::-webkit-slider-thumb:hover {
      background: #60a5fa;
    }

    /* Nav links styles */
    .nav-links {
      display: flex;
      gap: 8px;
    }
    .nav-link-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-display);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 6px;
      transition: all 0.2s ease;
      outline: none;
    }
    .nav-link-btn:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
    }

    /* Modal Overlay Styles */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(15px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    .modal-window {
      background: rgba(10, 15, 26, 0.95);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 95vw;
      max-width: 1420px;
      height: 90vh;
      max-height: 90vh;
      display: grid;
      grid-template-rows: 64px 1fr;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
      animation: modal-zoom 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes modal-zoom {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 30px;
      border-bottom: 1px solid var(--border);
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .modal-close-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 6px;
      transition: color 0.15s ease;
    }
    .modal-close-btn:hover {
      color: white;
    }
    .modal-body {
      padding: 30px;
      overflow-y: auto;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Lightbox Modal */
    .lightbox-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .lightbox-img {
      max-width: 95vw;
      max-height: 95vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
      animation: modal-zoom 0.25s ease-out;
    }

    /* Form Styles */
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .form-control {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: white;
      padding: 12px 16px;
      font-family: var(--font-sans);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s ease;
    }
    .form-control:focus {
      border-color: #3b82f6;
    }
    
    /* Tabs for Student's Corner */
    .corner-tabs {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
      padding-bottom: 12px;
    }
    .tab-btn-group {
      display: flex;
      gap: 16px;
    }
    .tab-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-display);
      font-size: 0.9rem;
      cursor: pointer;
      padding-bottom: 12px;
      position: relative;
    }
    .tab-btn.active {
      color: white;
      font-weight: 600;
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -13px;
      left: 0;
      right: 0;
      height: 2px;
      background: #3b82f6;
    }

    .badge.archived {
      color: #94a3b8;
      background: rgba(148, 163, 184, 0.1);
      border: 1px solid rgba(148, 163, 184, 0.2);
    }

    /* Sidebar Enlarged Showcase Card for Drawings & PDFs */
    .sidebar-enlarged-card {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #090c15;
      transition: border-color 0.2s ease;
      cursor: pointer;
    }
    .sidebar-enlarged-card:hover {
      border-color: rgba(255, 255, 255, 0.2);
    }
    .sidebar-enlarged-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .sidebar-enlarged-overlay {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.9) 60%);
      padding: 16px;
      display: flex;
      flex-direction: column;
    }

    /* Submissions Grid */
    .submission-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 24px;
    }
    .submission-card {
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .submission-card:hover {
      background: rgba(255, 255, 255, 0.02);
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.15);
    }
    .submission-thumb-wrap {
      width: 100%;
      height: 180px;
      overflow: hidden;
      background: #090c15;
    }
    .submission-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .submission-info {
      padding: 14px;
    }
    .submission-title {
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 500;
      color: white;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .submission-author {
      font-size: 0.74rem;
      color: var(--text-muted);
    }

    /* Submission List (Articles) */
    .submission-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .submission-list-item {
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .submission-list-item:hover {
      background: rgba(255, 255, 255, 0.02);
      border-color: rgba(255,255,255,0.15);
    }
    .article-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .article-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 600;
      color: white;
    }
    .article-author {
      font-size: 0.74rem;
      color: var(--text-muted);
    }
    .article-snippet {
      font-size: 0.85rem;
      line-height: 1.5;
      color: var(--text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Admin Moderation Panel */
    .admin-login-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 300px;
    }
    .admin-login-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 30px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    .admin-table th, .admin-table td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .admin-table th {

    @media (max-width: 768px) {

        display: none; /* Hide descriptions on narrow mobile devices in list view to keep it compact */
      }
      .bottom-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<script>
  const REFRESH_MS = 10 * 60 * 1000;
  const $ = (id) => document.getElementById(id);

  let newsList = [];
  let newsIndex = 0;
  let newsTimer = null;
  let newsScrollMode = false;

  let launchesList = [];
  let eventsList = [];
  let nextLaunchData = null;
  let nextEventData = null;
  let countdownTimer = null;
  let nextMoonData = null;
  let planetsData = [];
  let neosData = [];
  let sunspotData = null;
  // GPS / location state — defaults to Sharjah, UAE
  let userLat = 25.3463;
  let userLon = 55.4209;
  let userLocationName = "Sharjah (UAE)";

  function fmtDateTime(v){
    const d = new Date(v);
    return isNaN(d) ? "TBD" : d.toLocaleString([], {
      year:"numeric", month:"short", day:"numeric", hour:"2-digit", minute:"2-digit"
    });
  }

  function fmtDate(v){
    const d = new Date(v);
    return isNaN(d) ? "TBD" : d.toLocaleDateString([], {
      year:"numeric", month:"short", day:"numeric"
    });
  }

  function stripHtml(s=""){
    return String(s).replace(/<[^>]*>/g," ").replace(/\s+/g," ").trim();
  }

  function showNextNews(){
    if(!newsList.length) return;
    const node = $("news");
    if(!node) return;
    
    // Active Spotlight item
    const activeItem = newsList[newsIndex];
    
    // Get the next 4 items in the list for the sidebar fallback
    const listItems = [];
    for (let i = 1; i <= 4; i++) {
      const nextIdx = (newsIndex + i) % newsList.length;
      listItems.push({ item: newsList[nextIdx], globalIndex: nextIdx });
    }
    
    let cleanSummary = stripHtml(activeItem.summary || "");
    // Clean up abrupt truncated words at the end if present in RSS source (e.g. "wind tunnel i...")
    cleanSummary = cleanSummary.replace(/\s+[a-z]{1,4}\.\.\.$/i, ".").replace(/\.\.\.$/, ".").trim();
    
    // If summary is missing, matches title, or is short (< 240 chars), enrich it with comprehensive space context to fill the box
    if (!cleanSummary || cleanSummary.toLowerCase() === activeItem.title.toLowerCase() || cleanSummary.length < 240) {
      const baseText = cleanSummary || activeItem.title;
      cleanSummary = `${baseText} Astronomers and space mission researchers continue to analyze real-time telemetry, orbital parameters, and spectral data to uncover deeper insights into planetary formation, atmospheric composition, and cosmic phenomena reported by ${activeItem.source || "Space News"}.`;
    }
    const shortSummary = cleanSummary;
    
    const hasImg = !!activeItem.imageUrl;
    const activeImgUrl = hasImg ? activeItem.imageUrl : "https://images-assets.nasa.gov/image/PIA03033/PIA03033~medium.jpg";

    // Determine what to show in the sidebar (creative submissions slideshow vs standard news)
    let sidebarHtml = "";
    if (approvedSubmissionsList && approvedSubmissionsList.length > 0) {
      const subCount = approvedSubmissionsList.length;
      const sub = approvedSubmissionsList[submissionIndex % subCount];
      
      const isDrawing = sub.type === 'drawing';
      const typeLabel = `${sub.role === 'student' ? 'Student' : 'Teacher'} ${isDrawing ? 'Drawing' : 'Article'}`;
      
      const clickAction = isDrawing
        ? `viewImage('${sub.content}', '${sub.title}', '${sub.authorName}', '${sub.schoolName || ''}', '${sub.inchargeName || ''}')`
        : `viewFullArticleFromShowcase('${sub.title}', '${sub.authorName}', '${sub.submittedAt}', '${sub.content}', '${sub.role}', '${sub.schoolName || ''}', '${sub.inchargeName || ''}')`;
      
      if (isDrawing) {
        sidebarHtml = `
          <div class="sidebar-enlarged-card" onclick="${clickAction}">
            <img class="sidebar-enlarged-img" src="${sub.content}" alt="" />
            <div class="sidebar-enlarged-overlay">
              <div class="story-meta" style="color: #60a5fa; font-weight: 600; margin-bottom:4px;">✨ ${typeLabel.toUpperCase()}</div>
              <div style="font-size:0.85rem; font-weight:700; color:white; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${sub.title}</div>
              <div style="font-size:0.72rem; color:var(--text-muted);">By ${sub.authorName} • Click to expand</div>
            </div>
          </div>
        `;
      } else {
        // PDF article: embed pdf iframe directly in the sidebar so the actual text of the PDF is visible!
        // We use a transparent click-catcher layer on top so that clicking anywhere opens the reader modal.
        sidebarHtml = `
          <div class="sidebar-enlarged-card">
            <div style="position:absolute; inset:0; z-index:10; cursor:pointer;" onclick="${clickAction}"></div>
            <iframe src="${sub.content}#toolbar=0&navpanes=0&scrollbar=0" width="100%" height="100%" style="border: none; background: white; border-radius: 8px; pointer-events: none;"></iframe>
            <div class="sidebar-enlarged-overlay" style="z-index: 20;">
              <div class="story-meta" style="color: #60a5fa; font-weight: 600; margin-bottom:4px;">✨ ${typeLabel.toUpperCase()}</div>
              <div style="font-size:0.85rem; font-weight:700; color:white; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${sub.title}</div>
              <div style="font-size:0.72rem; color:var(--text-muted);">By ${sub.authorName} • Click to read</div>
            </div>
          </div>
        `;
      }
      
      // Advance submission index by 1 for next rotation step
      submissionIndex = (submissionIndex + 1) % subCount;
    } else {
      // Separate widget: NASA SOHO Live Sunspot Activity with details at the TOP
      const sunImg = sunspotData?.imageUrl || "https://soho.nascom.nasa.gov/data/synoptic/sunspots_earth/mdi_sunspots.jpg";
      const mProb = sunspotData?.mClass || "55%";
      const xProb = sunspotData?.xClass || "10%";

      sidebarHtml = `
        <div onclick="openSunspotModal()" style="display: flex; flex-direction: column; height: 100%; width: 100%; border-radius: 12px; border: 1.5px solid rgba(251, 146, 60, 0.45); background: rgba(14, 10, 6, 0.12); backdrop-filter: blur(12px); box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25), 0 0 18px rgba(251, 146, 60, 0.15); overflow: hidden; cursor: pointer; transition: all 0.25s ease;" onmouseover="this.style.borderColor='rgba(251, 146, 60, 0.75)'; this.style.boxShadow='0 8px 30px rgba(0, 0, 0, 0.4), 0 0 25px rgba(251, 146, 60, 0.3)';" onmouseout="this.style.borderColor='rgba(251, 146, 60, 0.45)'; this.style.boxShadow='0 8px 24px rgba(0, 0, 0, 0.25), 0 0 18px rgba(251, 146, 60, 0.15)';">
          <!-- TOP DETAILS HEADER -->
          <div style="padding: 10px 14px; background: rgba(251, 146, 60, 0.12); border-bottom: 1px solid rgba(251, 146, 60, 0.25); flex-shrink: 0;">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px;">
              <div style="color: #fb923c; font-size: 0.70rem; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;">☀️ SOHO LIVE SUNSPOT ACTIVITY</div>
              <span style="font-size: 0.55rem; color: #fde047; background: rgba(253,224,71,0.15); border: 1px solid rgba(253,224,71,0.3); padding: 1px 6px; border-radius: 4px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.4px;">NASA SOHO</span>
            </div>
            <div style="font-size: 0.92rem; font-weight: 700; color: #ffffff; line-height: 1.25; margin-bottom: 4px;">Solar Disk & Active Sunspot Regions</div>
            <div style="font-size: 0.68rem; color: #fdba74; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; font-weight: 500;">
              <span>M-Flare: <strong style="color: #ffffff;">${mProb}</strong></span>
              <span>•</span>
              <span>X-Flare: <strong style="color: #ffffff;">${xProb}</strong></span>
              <span>•</span>
              <span style="color: #60a5fa; font-weight: 600;">Click for Details ↗</span>
            </div>
          </div>
          
          <!-- LIVE SOHO SOLAR DISK IMAGE -->
          <div style="flex: 1; min-height: 0; background: #000; display: flex; align-items: center; justify-content: center; padding: 6px; position: relative;">
            <img src="${sunImg}" alt="NASA SOHO Live Sunspots" onerror="this.src='https://sdo.gsfc.nasa.gov/assets/img/latest/latest_512_HMIIF.jpg'" style="width: 100%; height: 100%; object-fit: contain; border-radius: 6px;" />
          </div>
        </div>
      `;
    }

    node.innerHTML = `
      <div class="spotlight-main-card">
        <div class="spotlight-text">
          <div class="spotlight-category">${activeItem.source || "Space News"}</div>
          <div class="spotlight-title">${activeItem.title}</div>
          <div class="spotlight-summary">${shortSummary}</div>
          <div class="spotlight-meta">
            ${fmtDateTime(activeItem.publishedAt)}
            ${activeItem.url ? `• <a href="${activeItem.url}" target="_blank" rel="noopener">Read Article ↗</a>` : ""}
          </div>
        </div>
        
        <div class="spotlight-image-container">
          <img class="spotlight-image" src="${activeImgUrl}" alt=""
               onerror="this.src='https://images-assets.nasa.gov/image/PIA03033/PIA03033~medium.jpg'" />
        </div>
      </div>
      
      <div class="stories-list">
        ${sidebarHtml}
      </div>
    `;
    
    // Increment newsIndex for next rotation
    newsIndex = (newsIndex + 1) % newsList.length;
  }

  window.selectSpotlight = function(idx) {
    if (newsTimer) clearInterval(newsTimer);
    newsIndex = idx;
    showNextNews();
    if (!newsScrollMode) {
      newsTimer = setInterval(showNextNews, 20000);
    }
  }

  function updateNewsView(){
    const node = $("news");
    const btn = $("toggleNewsMode");
    if(!node || !btn) return;

    if (newsScrollMode) {
      if (newsTimer) clearInterval(newsTimer);
      node.className = "scroll-layout";
      btn.classList.add("scroll-mode");
      btn.innerHTML = `<span>📰 Scroll Mode</span>`;
      
      node.innerHTML = newsList.map(n => {
        const cardImg = n.imageUrl || "https://images-assets.nasa.gov/image/PIA03033/PIA03033~medium.jpg";
        return `
          <div class="scroll-card">
            <img class="scroll-thumb" src="${cardImg}" alt=""
                 onerror="this.src='https://images-assets.nasa.gov/image/PIA03033/PIA03033~medium.jpg'" />
            <div class="scroll-details">
              <div class="scroll-meta">${n.source} • ${fmtDateTime(n.publishedAt)}</div>
              <div class="scroll-title">${n.url ? `<a href="${n.url}" target="_blank" rel="noopener">${n.title}</a>` : n.title}</div>
              <div class="scroll-desc">${stripHtml(n.summary || "").slice(0, 160)}...</div>
            </div>
          </div>

    }
    // 3. Comets
    if (fullText.includes("comet") || fullText.includes("neowise") || fullText.includes("halley")) {

    // 4. Planets / Conjunction / Opposition
    if (fullText.includes("conjunction") || fullText.includes("opposition") || fullText.includes("saturn") || fullText.includes("jupiter") || fullText.includes("mars") || fullText.includes("venus") || fullText.includes("mercury") || fullText.includes("planet")) {
      return "https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?auto=format&fit=crop&w=300&q=80"; // Planetary alignment
    }
    // 5. Supermoons / Full Moons / Lunar events
    if (name.includes("moon") || fullText.includes("supermoon") || fullText.includes("full moon") || fullText.includes("new moon") || fullText.includes("lunar") || fullText.includes("apollo")) {
      return "https://images.unsplash.com/photo-1522030299830-16b8d3d049fe?auto=format&fit=crop&w=300&q=80"; // Moon photo
    }
    // 6. ISRO / India Space / National Science

  }

  function getTadMoonPhaseImage(phaseName) {
    const name = String(phaseName || "").toLowerCase();
    if (name.includes("full")) return "https://c.tadst.com/gfx/moon1.svg";
    if (name.includes("third") || name.includes("last quarter")) return "https://c.tadst.com/gfx/moon2.svg";

    return "https://c.tadst.com/gfx/moon4.svg";
  }

  function getMoonPhaseAndIllumination(date = new Date()) {
    const baseNewMoon = new Date("2000-01-06T18:14:00Z").getTime();
    const msPerDay = 24 * 60 * 60 * 1000;
    const synodicMonth = 29.530588853;
    
    const diffDays = (date.getTime() - baseNewMoon) / msPerDay;
    const phaseValue = (diffDays / synodicMonth) % 1.0;
    const age = phaseValue * synodicMonth;
    const illumination = Math.round((1 - Math.cos(2 * Math.PI * phaseValue)) / 2 * 100);
    
    let name = "";
    if (age < 1.0 || age > 28.53) name = "New Moon";
    else if (age < 6.8) name = "Waxing Crescent";
    else if (age < 8.0) name = "First Quarter";
    else if (age < 13.8) name = "Waxing Gibbous";
    else if (age < 15.8) name = "Full Moon";
    else if (age < 21.5) name = "Waning Gibbous";
    else if (age < 22.8) name = "Third Quarter";
    else name = "Waning Crescent";
    
    const imageUrl = getTadMoonPhaseImage(name);
    
    return { name, illumination, imageUrl };
  }

  function getSunTimings(date = new Date()) {
    const start = new Date(date.getFullYear(), 0, 0);
    const diff = date - start;
    const oneDay = 1000 * 60 * 60 * 24;
    const dayOfYear = Math.floor(diff / oneDay);
    const angle = (2 * Math.PI * (dayOfYear - 172)) / 365;
    
    const riseOffsetMinutes = Math.sin(angle) * 57.5;
    const riseMinutes = 377.5 + riseOffsetMinutes;
    
    const setOffsetMinutes = Math.sin(angle) * 52.5;
    const setMinutes = 1102.5 - setOffsetMinutes;
    
    const formatTime = (totalMinutes) => {
      const h = Math.floor(totalMinutes / 60);
      const m = Math.floor(totalMinutes % 60);
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    };
    
    return {
      sunrise: formatTime(riseMinutes),
      sunset: formatTime(setMinutes)
    };
  }

  function getMoonTimings(date = new Date()) {
    const baseNewMoon = new Date("2000-01-06T18:14:00Z").getTime();
    const msPerDay = 24 * 60 * 60 * 1000;
    const synodicMonth = 29.530588853;
    
    const diffDays = (date.getTime() - baseNewMoon) / msPerDay;
    const phaseValue = (diffDays / synodicMonth) % 1.0;
    
    const riseMinutes = (6 * 60 + phaseValue * 24 * 60) % (24 * 60);
    const setMinutes = (riseMinutes + 12 * 60) % (24 * 60);
    
    const formatTime = (totalMinutes) => {
      const h = Math.floor(totalMinutes / 60);
      const m = Math.floor(totalMinutes % 60);
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    };
    
    return {
      moonrise: formatTime(riseMinutes),
      moonset: formatTime(setMinutes)
    };
  }

  function requestGpsLocation() {
    const btn = $("gpsBtn");
    if (!navigator.geolocation) {
      $("statusText").textContent = "GPS not supported by this browser.";
      return;
    }
    if (btn) { btn.textContent = "..."; btn.style.color = "#fde047"; }
    $("statusText").textContent = "Requesting GPS…";
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        userLat = pos.coords.latitude;
        userLon = pos.coords.longitude;
        // Reverse geocode display name using open-meteo geocoding (no key needed)
        try {
          const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${userLat}&lon=${userLon}&format=json`);
          const geoJson = await geoRes.json();
          const city = geoJson?.address?.city || geoJson?.address?.town || geoJson?.address?.village || geoJson?.address?.state || "Your Location";
          const country = geoJson?.address?.country || "";
          userLocationName = country ? `${city}, ${country}` : city;
        } catch (_) {
          userLocationName = `${userLat.toFixed(2)}°N, ${userLon.toFixed(2)}°E`;
        }
        const lbl = $("locationLabel");
        if (lbl) lbl.textContent = userLocationName;
        if (btn) { btn.textContent = "GPS"; btn.style.color = "#34d399"; }
        $("statusText").textContent = `Location: ${userLocationName} — refreshing data…`;
        await loadCityAstro();
      },
      (err) => {
        if (btn) { btn.textContent = "GPS"; btn.style.color = "#60a5fa"; }
        $("statusText").textContent = `GPS denied — using Sharjah. (${err.message})`;
      },
      { timeout: 10000, maximumAge: 60000 }
    );
  }

  async function loadCityAstro() {
    const params = `lat=${userLat}&lon=${userLon}&locationName=${encodeURIComponent(userLocationName)}`;
    const [moonRes, planetsRes] = await Promise.all([
      safeFetch(`/api/moon?${params}`),
      safeFetch(`/api/planets?${params}`)
    ]);
    nextMoonData = moonRes && moonRes.ok ? moonRes : null;
    planetsData = planetsRes && planetsRes.ok ? planetsRes.planets : [];
    renderStaticBottomRow();
  }

  function formatCountdown(targetDateStr) {
    if (!targetDateStr) return "--d : --h : --m : --s";
    const target = new Date(targetDateStr).getTime();
    const now = new Date().getTime();
    const diff = target - now;
    if (diff <= 0) {
      return "00d : 00h : 00m : 00s";
    }
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
    
    const pad = (num) => String(num).padStart(2, '0');
    return `${pad(days)}d : ${pad(hours)}h : ${pad(minutes)}m : ${pad(seconds)}s`;
  }

  function updateCountdowns() {
    const launchEl = $("launchCountdown");
    const eventEl = $("eventCountdown");
    if (launchEl && nextLaunchData) {
      launchEl.textContent = formatCountdown(nextLaunchData.net);
    }
    if (eventEl && nextEventData) {
      eventEl.textContent = formatCountdown(nextEventData.date);
    }
  }

  async function safeFetch(url){
    try{
      const r = await fetch(url);
      if(!r.ok) throw new Error(`${url} -> ${r.status}`);
      return await r.json();
    }catch(err){
      return { ok:false, items:[], error:err.message };
    }
  }

  async function loadAll(){
    $("statusText").textContent = "Updating feeds…";
    const params = `lat=${userLat}&lon=${userLon}&locationName=${encodeURIComponent(userLocationName)}`;

    const [newsRes, launchesRes, eventsRes, moonRes, planetsRes, neosRes, sunspotRes] = await Promise.all([
      safeFetch("/api/news"),
      safeFetch("/api/launches"),
      safeFetch("/api/events"),
      safeFetch(`/api/moon?${params}`),
      safeFetch(`/api/planets?${params}`),
      safeFetch("/api/neos"),
      safeFetch("/api/sunspots")
    ]);

    const news = newsRes.items || [];
    const launches = launchesRes.items || [];
    const events = eventsRes.items || [];
    nextMoonData = moonRes && moonRes.ok ? moonRes : null;
    planetsData = planetsRes && planetsRes.ok ? planetsRes.planets : [];
    neosData = neosRes && neosRes.ok ? neosRes.items : [];
    sunspotData = sunspotRes && sunspotRes.ok ? sunspotRes : null;

    newsList = news;
    newsIndex = 0;
    updateNewsView();

    launchesList = launches;
    eventsList = events;

    const now = new Date();
    
    // Filter and find the closest upcoming launch
    const upcomingLaunches = launchesList.filter(l => l.net && new Date(l.net) > now);
    upcomingLaunches.sort((a, b) => new Date(a.net) - new Date(b.net));
    nextLaunchData = upcomingLaunches[0] || launchesList[0] || null;

    // Filter and find the closest upcoming celestial event (using YYYY-MM-DD comparison to show today's events)
    const pad2 = (num) => String(num).padStart(2, '0');
    const todayStr = `${now.getFullYear()}-${pad2(now.getMonth() + 1)}-${pad2(now.getDate())}`;
    const upcomingEvents = eventsList.filter(e => {
      if (!e.date) return false;
      const eventDate = new Date(e.date);
      if (isNaN(eventDate)) return false;
      const eventStr = `${eventDate.getFullYear()}-${pad2(eventDate.getMonth() + 1)}-${pad2(eventDate.getDate())}`;
      return eventStr >= todayStr;
    });
    upcomingEvents.sort((a, b) => new Date(a.date) - new Date(b.date));
    nextEventData = upcomingEvents[0] || eventsList[0] || null;

    renderStaticBottomRow();
    updateCountdowns();

    if (!countdownTimer) {
      countdownTimer = setInterval(updateCountdowns, 1000);
    }

    // Refresh homepage showcase
    await loadHomepageShowcase();

    // Removed ticker status text as social follow buttons are displayed instead

    const failedCount = [newsRes, launchesRes, eventsRes].filter((x) => x.ok === false).length;
    $("statusText").textContent = failedCount
      ? `Partial update (${failedCount} source issue) • ${new Date().toLocaleTimeString()}`
      : `Last update: ${new Date().toLocaleTimeString()}`;
  }

    tick();

      body.innerHTML = `<div style="text-align:center; padding: 40px 0; color:#f87171;">Fetch error: ${err.message}</div>`;
    }
  }

  window.moderateSubmission = async function(id, action) {
    try {
      const res = await fetch("/api/admin/submissions/moderate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": adminToken
        },
        body: JSON.stringify({ id, action })
      });
      const data = await res.json();
      if (res.ok && data.ok) {
        loadAdminPortal();
        loadHomepageShowcase();
      } else {
        alert("Moderate failed: " + data.error);
      }
    } catch (err) {
      alert("Moderate error: " + err.message);
    }
  }

  window.loadHomepageShowcase = async function() {
    try {
      const res = await fetch("/api/submissions");
      const data = await res.json();
      if (res.ok && data.ok) {
        const submissions = data.items || [];
        approvedSubmissionsList = submissions.filter(x => x.status === 'approved');
        
        // Re-render sidebar in-place without advancing news Index
        if (newsList.length > 0) {
          newsIndex = (newsIndex - 1 + newsList.length) % newsList.length;
          showNextNews();
        }
      }
    } catch (err) {
      console.error("Homepage showcase fetch error:", err.message);
    }
  };
